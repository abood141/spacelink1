  <script>
    // ── Service Worker Cache ─────────────────────────────
    if ('serviceWorker' in navigator) {
      const sw = `const C='sl-v4',A=['https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{if(e.request.url.includes('supabase'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open(C).then(x=>x.put(e.request,c));}return res;})));});`;
      try { navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))); } catch { }
    }

    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script'); s.src = src;
        s.onload = res; s.onerror = () => rej(new Error('Failed: ' + src));
        document.head.appendChild(s);
      });
    }

    function showError(msg) {
      document.getElementById('loading').innerHTML = `<div style="color:#F75D5D;text-align:center;padding:24px;font-family:Tahoma">
    <div style="font-size:36px;margin-bottom:10px">⚠️</div>
    <div style="font-weight:700;margin-bottom:6px;font-size:16px">خطأ في التحميل</div>
    <div style="font-size:12px;color:#5A6A85;margin-bottom:12px">تأكد من اتصال الإنترنت</div>
    <button onclick="localStorage.removeItem('sl_c');location.reload()" style="background:#4F8EF7;border:none;color:#fff;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px">🔄 إعادة تحميل</button>
    <div style="font-size:10px;color:#5A6A85;margin-top:8px;max-width:300px;word-break:break-all">${msg}</div></div>`;
    }

    async function boot() {
      try {
        if (document.readyState === 'loading') {
          await new Promise(r => document.addEventListener('DOMContentLoaded', r));
        }
        await Promise.all([
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'),
          loadScript('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'),
          loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js').catch(() => { }),
          loadScript('https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js')
        ]);
        const src = document.getElementById('app-src').textContent;
        let hash = 0; for (let i = 0; i < src.length; i += 80)hash = (hash * 31 + src.charCodeAt(i)) >>> 0;
        const key = 'sl_c_' + hash;
        let compiled = null;
        try { compiled = localStorage.getItem(key); } catch { }
        if (!compiled) {
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js');
          await new Promise(r => setTimeout(r, 0));
          compiled = Babel.transform(src, { presets: ['react'], compact: true, comments: false }).code;
          try {
            Object.keys(localStorage).filter(k => k.startsWith('sl_c_')).forEach(k => localStorage.removeItem(k));
            localStorage.setItem(key, compiled);
          } catch { }
        }
        const App = new Function('React', 'ReactDOM', compiled + '\nreturn App;')(React, ReactDOM);
        document.getElementById('loading').style.display = 'none';
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } catch (e) { showError(e.message); }
    }
    boot();
  </script>

  <script type="text/plain" id="app-src">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── Config ───────────────────────────────────────────
const SB_URL="https://icpqrnzvxjexdzwfkcjm.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcHFybnp2eGpleGR6d2ZrY2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDE2ODksImV4cCI6MjA4OTQxNzY4OX0.mvnD_Cr1EbBtMLiD0VwhdxXAo8bSDTRxRyF2Squ0aE8";
const HDR={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json"};

// ── Supabase ─────────────────────────────────────────
async function sbFetch(url,opts,tries=4){
  for(let i=0;i<tries;i++){
    try{
      // First try: 10s, second: 15s, third+: 20s (Supabase cold start can take ~10s)
      const timeout=i===0?10000:i===1?15000:20000;
      const r=await Promise.race([
        fetch(url,opts),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),timeout))
      ]);
      if(!r.ok)throw new Error(await r.text());
      if(r.status===204)return null;
      const text=await r.text();
      return text?JSON.parse(text):null;
    }catch(e){
      if(i===tries-1)throw e;
      // Wait 2s, 3s, 4s between retries
      await new Promise(r=>setTimeout(r,2000*(i+1)));
    }
  }
}
const sb={
  q:(t,f='')=>sbFetch(`${SB_URL}/rest/v1/${t}${f?'?'+f:''}`,{headers:HDR}),
  ins:(t,d)=>sbFetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...HDR,Prefer:'return=representation'},body:JSON.stringify(d)}).then(r=>Array.isArray(r)?r[0]:r),
  upd:(t,f,d)=>sbFetch(`${SB_URL}/rest/v1/${t}?${f}`,{method:'PATCH',headers:{...HDR,Prefer:'return=representation'},body:JSON.stringify(d)},2),
  del:(t,f)=>sbFetch(`${SB_URL}/rest/v1/${t}?${f}`,{method:'DELETE',headers:HDR},2),
};

// ── Utils ────────────────────────────────────────────
const baghdadNow=()=>new Date(Date.now()+3*3600000);
const now=()=>baghdadNow().toLocaleString("en-GB",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
const today=()=>baghdadNow().toISOString().slice(0,10);
function hashPw(pw){let h=5381;for(let i=0;i<pw.length;i++)h=((h<<5)+h)^pw.charCodeAt(i);return(h>>>0).toString(16).padStart(8,"0");}
const normD=d=>{if(!d)return"";const m=d.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})|(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);if(!m)return"";const p=x=>String(x).padStart(2,'0');return m[1]?`${m[1]}-${p(m[2])}-${p(m[3])}`:`${m[6]}-${p(m[5])}-${p(m[4])}`;};
const getDate=r=>normD(r?.createdAt||r?.created_at);
const isToday=d=>normD(d)===today();

// ── Local cache ──────────────────────────────────────
const LC={
  get(k){try{return JSON.parse(localStorage.getItem('sl_'+k)||'null')}catch{return null}},
  set(k,v){try{localStorage.setItem('sl_'+k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem('sl_'+k)}catch{}},
};

// ── Background Sync Queue ─────────────────────────────
const SQ={
  _key:'sl_sync_queue',
  get(){return LC.get('sync_queue')||[];},
  add(op){const q=this.get();q.push({...op,id:Date.now(),ts:now()});LC.set('sync_queue',q);},
  remove(id){LC.set('sync_queue',this.get().filter(o=>o.id!==id));},
  async flush(){
    const q=this.get();if(!q.length)return;
    let flushed=0;
    const processedIds=new Set();
    for(const op of q){
      try{
        if(op.type==='expense'){
          await DB.expenses.add(op.data);
          await DB.audit.add(op.actor,'صرفية (offline)','تم إرسالها لاحقاً: '+op.data.subscriberName);
        }else if(op.type==='receipt'){
          await DB.receipts.add(op.data.techId,op.data.itemId,op.data.quantity,op.data.notes,op.data.adminId);
        }
        processedIds.add(op.id);flushed++;
      }catch(e){console.warn('SQ flush failed:',e.message);break;}
    }
    if(flushed>0){
      const remaining=this.get().filter(o=>!processedIds.has(o.id));
      LC.set('sync_queue',remaining);
      await GS.reload('receipts','expenses');
    }
    return flushed;
  }
};
// Flush queue when online
window.addEventListener('online',()=>{SQ.flush();});

// ── DB Layer ─────────────────────────────────────────
const mi=r=>r?{id:r.id,name:r.name,unit:r.unit,stock:r.stock||0,threshold:r.threshold,category:r.category,image:r.image,is_active:r.is_active??true}:null;
const mt=r=>r?{id:r.id,name:r.name,phone:r.phone,is_active:r.is_active??true,createdAt:r.created_at}:null;
const mtu=r=>r?{id:r.id,username:r.username,passwordHash:r.password_hash,techId:r.tech_id,createdAt:r.created_at}:null;
const mv=r=>r?{id:r.id,username:r.username,passwordHash:r.password_hash,displayName:r.display_name,createdAt:r.created_at}:null;
const mr=r=>r?{id:r.id,techId:r.tech_id,itemId:r.item_id,quantity:r.quantity,notes:r.notes,adminId:r.admin_id,type:r.type||'receipt',createdAt:r.created_at}:null;
const me=r=>r?{id:r.id,techId:r.tech_id,itemId:r.item_id,quantity:r.quantity,subscriberName:r.subscriber_name,subscriberUser:r.subscriber_user,notes:r.notes,workImage:r.work_image,groupId:r.group_id,createdAt:r.created_at}:null;

const DB={
  items:{
    async all(){const c=LC.get('items');if(c)return c;const d=(await sb.q('items','order=id.asc')).map(mi);LC.set('items',d);return d;},

async add(item){const r=await sb.ins('items',{name:item.name,unit:item.unit,stock:item.stock||0,threshold:item.threshold,category:item.category,image:item.image||null,created_at:now()});LC.del('items');return mi(r);},
async upd(item){await sb.upd('items',`id=eq.${item.id}`,{name:item.name,unit:item.unit,stock:item.stock||0,threshold:item.threshold,category:item.category,image:item.image||null});LC.del('items');},
    async del(id){await sb.upd('items',`id=eq.${id}`,{is_active:false});LC.del('items');},
  },
  techs:{
    async all(){const c=LC.get('techs');if(c)return c;const d=(await sb.q('technicians','order=id.asc')).map(mt);LC.set('techs',d);return d;},
    async find(id){return(await DB.techs.all()).find(t=>t.id===+id)||null;},
    async add(name,phone){const r=await sb.ins('technicians',{name,phone:phone||null,created_at:now()});LC.del('techs');return mt(r);},
    async del(id){await sb.upd('technicians',`id=eq.${id}`,{is_active:false});LC.del('techs');LC.del('techUsers');LC.del('expenses');},
  },
  techUsers:{
    async all(){const c=LC.get('techUsers');if(c)return c;const d=(await sb.q('tech_users','order=id.asc')).map(mtu);LC.set('techUsers',d);return d;},
    async byTech(tid){return(await DB.techUsers.all()).find(u=>u.techId===+tid)||null;},
    async exists(u){return!!(await DB.techUsers.all()).find(x=>x.username===u);},
    async login(u,p){return(await DB.techUsers.all()).find(x=>x.username===u&&x.passwordHash===hashPw(p))||null;},
    async add(tid,u,p){const r=await sb.ins('tech_users',{tech_id:tid,username:u,password_hash:hashPw(p),created_at:now()});LC.del('techUsers');return mtu(r);},
    async changePw(id,p){await sb.upd('tech_users',`id=eq.${id}`,{password_hash:hashPw(p)});LC.del('techUsers');},
  },
  viewers:{

    async login(u,p){return(await DB.viewers.all()).find(v=>v.username===u&&v.passwordHash===hashPw(p))||null;},

    async del(id){await sb.del('admin_user',`id=eq.${id}`);},

// ── Global Store (stale-while-revalidate) ────────────
const GS={
  _d:{},_p:{},_cbs:[],_status:'',
  on(fn){this._cbs.push(fn);return()=>{this._cbs=this._cbs.filter(c=>c!==fn)};},
  emit(){this._cbs.forEach(fn=>fn({...this._d}));},
  get(){return this._d;},
  loadStale(){
    try{
      const s=localStorage.getItem('sl_gs2');
      if(s)Object.assign(this._d,JSON.parse(s));
    }catch{}
  },
  persist(){
    try{const o={};['items','techs','receipts','expenses'].forEach(k=>{if(this._d[k])o[k]=this._d[k];});localStorage.setItem('sl_gs2',JSON.stringify(o));}catch{}
  },
  async ping(){
    try{
      await Promise.race([
        fetch(`${SB_URL}/rest/v1/`,{headers:{apikey:SB_KEY}}),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))
      ]);
    }catch{}
  },
  async load(keys){
    const all=keys||['items','techs','receipts','expenses'];
    const need=all.filter(k=>!this._p[k]);
    if(!need.length)return this._d;
    need.forEach(k=>this._p[k]=true);
    const map={items:()=>DB.items.all(),techs:()=>DB.techs.all(),techUsers:()=>DB.techUsers.all(),receipts:()=>DB.receipts.all(),expenses:()=>DB.expenses.all()};
    this._status='loading';this.emit();
    // Wake up Supabase first
    await this.ping();
    let ok=true;
    await Promise.all(need.map(async k=>{
      if(map[k])try{this._d[k]=await map[k]();}
      catch(e){ok=false;need.forEach(x=>delete this._p[x]);console.warn('GS:',k,e.message);}
    }));
    this._status=ok?'ok':'error';
    this.emit();
    if(ok)this.persist();
    return this._d;
  },
  inval(...keys){keys.forEach(k=>{delete this._d[k];delete this._p[k];LC.del(k);});},
  async reload(...keys){this.inval(...keys);return this.load(keys);},
  async forceReload(){this._d={};this._p={};['items','techs','receipts','expenses'].forEach(k=>LC.del(k));await this.ping();return this.load();},
};

const RT={
  _client:null,_channels:[],_active:false,_timers:{},
  init(){
    if(this._active||!window.supabase)return;
    try{
      this._client=window.supabase.createClient(SB_URL,SB_KEY,{
        realtime:{params:{eventsPerSecond:10}},
        auth:{persistSession:false,autoRefreshToken:false}
      });
      this._active=true;
    }catch(e){console.warn('[RT] init failed:',e.message);}
  },
  subscribe(){
    if(!this._active||this._channels.length)return;
    const tables=['receipts','expenses','items','technicians'];
    tables.forEach(table=>{
      const ch=this._client
        .channel('sl:'+table)
        .on('postgres_changes',{event:'*',schema:'public',table},(payload)=>{
          console.log('[RT]',table,payload.eventType);
          const gsKey=table==='technicians'?'techs':table;
          clearTimeout(this._timers[gsKey]);
          this._timers[gsKey] = setTimeout(()=>{
            LC.del(gsKey);
            GS.reload(gsKey);
          }, 500);
        })
        .subscribe((status)=>{
          if(status==='SUBSCRIBED')console.log('[RT] subscribed:',table);
          if(status==='CHANNEL_ERROR')console.warn('[RT] channel error:',table);
        });
      this._channels.push(ch);
    });
  },
  unsubscribe(){
    if(!this._client)return;
    this._channels.forEach(ch=>{try{this._client.removeChannel(ch);}catch{}});
    this._channels=[];
  },
};

function useGS(keysArg){
  const keysStr = JSON.stringify(keysArg);
  const [d, setD] = useState(() => ({...GS.get()}));
  useEffect(() => {
    const keys = JSON.parse(keysStr);
    let last = GS.get();
    const off = GS.on((newGS) => {
      const changed = keys ? keys.some(k => newGS[k] !== last[k]) : true;
      if (changed || newGS._status !== last._status) {
        last = {...newGS};
        setD(last);
      }
    });
    GS.load(keys);
    return off;
  }, [keysStr]);
  return d;
}

// ── Helpers ───────────────────────────────────────────
function calcBals(techId,items,receipts,expenses){
  const stats = {};
  for(const r of (receipts||[])){
    if(r.techId!==+techId)continue;
    if(!stats[r.itemId]) stats[r.itemId]={rec:0,ret:0,sp:0};
    if(r.type==='return') stats[r.itemId].ret+=r.quantity;
    else stats[r.itemId].rec+=r.quantity;
  }
  for(const e of (expenses||[])){
    if(e.techId!==+techId)continue;
    if(!stats[e.itemId]) stats[e.itemId]={rec:0,ret:0,sp:0};
    stats[e.itemId].sp+=e.quantity;
  }
  const result=[];
  for(const item of items){
    const s=stats[item.id];
    if(s&&(s.rec>0||s.sp>0||s.ret>0)){
      result.push({...item,received:s.rec,spent:s.sp,returned:s.ret,balance:s.rec-(s.sp+s.ret)});
    }
  }
  return result;
}
function groupExpenses(expenses){
  const m={};
  expenses.forEach(e=>{const k=e.groupId||(e.createdAt+'_'+(e.subscriberName||''));if(!m[k])m[k]=[];m[k].push(e);});
  return Object.values(m).sort((a,b)=>b[0].createdAt>a[0].createdAt?1:-1);
}

const ARCHIVE_KEY='sl_history_archive';
function getArchive(){try{return JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'[]');}catch{return[];}}
function saveArchive(a){try{localStorage.setItem(ARCHIVE_KEY,JSON.stringify(a));}catch{}}
function archiveYesterday(receipts,expenses,techs,items){
  const bd=baghdadNow();
  const yd=new Date(bd.getTime()-86400000);
  const yStr=yd.toISOString().slice(0,10);
  const ar=getArchive();
  if(ar.find(d=>d.date===yStr))return;
  const R=(receipts||[]).filter(r=>getDate(r)===yStr);
  const E=(expenses||[]).filter(e=>getDate(e)===yStr);
  if(!R.length&&!E.length)return;
  const T=techs||[],I=items||[];
  const recs=R.map(r=>({...r,type:"تسليم",techName:T.find(t=>t.id===r.techId)?.name||"—",itemName:I.find(i=>i.id===r.itemId)?.name||"—",unit:I.find(i=>i.id===r.itemId)?.unit||""}));
  const rawExp=E.map(e=>({...e,type:"صرفية",techName:T.find(t=>t.id===e.techId)?.name||"—",itemName:I.find(i=>i.id===e.itemId)?.name||"—",unit:I.find(i=>i.id===e.itemId)?.unit||""}));
  ar.unshift({date:yStr,receipts:recs,expGroups:groupExpenses(rawExp)});
  saveArchive(ar.slice(0,30));
}
async function checkMidnightArchive(gs){
  const todayStr=today();
  const lastCheck=LC.get('last_archive_check');
  if(lastCheck!==todayStr && gs.receipts && gs.techs){
    archiveYesterday(gs.receipts,gs.expenses,gs.techs,gs.items);
    try {
      const ops = [];
      gs.techs.forEach(t => {
        const bals = calcBals(t.id, gs.items, gs.receipts, gs.expenses);
        bals.forEach(b => {
          if (b.balance < 0) {
             ops.push(DB.receipts.add(t.id, b.id, Math.abs(b.balance), "تصفير تلقائي", null, 'receipt'));
          } else if (b.balance > 0) {
             ops.push(DB.receipts.add(t.id, b.id, b.balance, "تصفير تلقائي", null, 'return'));
          }
        });
      });
      if(ops.length > 0) {
        await Promise.all(ops);
        await DB.audit.add("النظام", "تصفير شامل", "تصفير العهد لليوم الجديد");
        GS.reload("receipts");
      }
    } catch(e) { console.warn("Auto-zero error:", e); }
    LC.set('last_archive_check',todayStr);
  }
}


function buildReportData(gs){
  const T=gs.techs||[],E=gs.expenses||[],R=gs.receipts||[],I=gs.items||[];
  let totalRemaining=0;
  const techStats=T.map(t=>{
    const b=calcBals(t.id,I,R,E);
    const rem=b.reduce((s,x)=>s+x.balance,0);totalRemaining+=rem;
    return{id:t.id,name:t.name,received:b.reduce((s,x)=>s+x.received,0),spent:b.reduce((s,x)=>s+x.spent,0),remaining:rem,items:b.length,low:b.filter(x=>x.balance>=0&&x.balance<=x.threshold).length};
  });
  const um={};E.forEach(e=>{const it=I.find(i=>i.id===e.itemId);if(!it)return;um[e.itemId]=um[e.itemId]||{name:it.name,unit:it.unit,total:0};um[e.itemId].total+=e.quantity;});
  const topItems=Object.values(um).sort((a,b)=>b.total-a.total);
  const days14=[...Array(14)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
  const lineData=days14.map(d=>({day:d.slice(5),قيمة:E.filter(e=>e.createdAt?.startsWith(d)||e.createdAt?.includes(d.replace(/-/g,'/'))).reduce((s,e)=>s+e.quantity,0)}));
  return{techs:T,expenses:E,receipts:R,items:I,techStats,topItems,lineData,totalRemaining};
}

function BarSVG({data,keys,colors,h=160}){
  if(!data?.length)return null;
  const vals=data.flatMap(d=>keys.map(k=>d[k]||0));const max=Math.max(...vals,1);
  const W=300,pad=28,sw=(W-pad)/data.length,bw=Math.max(4,(sw/keys.length)-3);
  return <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h}}>
    {data.map((d,i)=>keys.map((k,ki)=>{const v=d[k]||0;const bh=Math.max(2,(v/max)*(h-pad-8));const x=pad+i*sw+ki*(bw+3);return <g key={k+i}><rect x={x} y={h-pad-bh} width={bw} height={bh} fill={colors[ki]} rx={2}/></g>;}))}{data.map((d,i)=><text key={i} x={pad+i*sw+sw/2} y={h-6} textAnchor="middle" fontSize={9} fill={C.muted}>{d.day||d.name||""}</text>)}
  </svg>;
}
function LineSVG({data,dataKey,color,h=140}){
  if(!data?.length)return null;
  const vals=data.map(d=>d[dataKey]||0);const max=Math.max(...vals,1);const W=300,pad=18;
  const pts=data.map((d,i)=>`${pad+i*((W-2*pad)/(data.length-1||1))},${pad+(1-(d[dataKey]||0)/max)*(h-2*pad)}`);
  return <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h}}>
    <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round"/>
    {data.map((d,i)=>{const x=pad+i*((W-2*pad)/(data.length-1||1));return <text key={i} x={x} y={h-2} textAnchor="middle" fontSize={9} fill={C.muted}>{d.day||""}</text>;})}
  </svg>;

function PieSVG({data,size=120}){
  if(!data?.length)return null;
  const tot=data.reduce((s,d)=>s+d.value,0)||1;let angle=-Math.PI/2;const r=44,cx=size/2,cy=size/2;
  return <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size}}>
    {data.map((d,i)=>{const sl=(d.value/tot)*Math.PI*2;const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+sl),y2=cy+r*Math.sin(angle+sl),lg=sl>Math.PI?1:0;const path=`M${cx} ${cy}L${x1} ${y1}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}Z`;angle+=sl;return <path key={i} d={path} fill={d.fill}/>;})}<circle cx={cx} cy={cy} r={22} fill={C.bg2}/>
  </svg>;
}

function TechItem({tech,items,receipts,expenses,user,toast,onEdit,onDelete}){
  const bals=useMemo(()=>calcBals(tech.id,items,receipts,expenses),[tech.id,items,receipts,expenses]);
  const [tuData,setTuData]=useState(null);
  useEffect(()=>{DB.techUsers.byTech(tech.id).then(setTuData);},[tech.id]);
  const low=bals.filter(b=>b.balance>=0&&b.balance<=b.threshold).length;
  
  const tRecs = receipts.filter(r => r.techId === tech.id && isToday(r.createdAt) && r.type !== 'return' && r.notes !== "تصفير تلقائي" && r.notes !== "System Reset");
  const tRets = receipts.filter(r => r.techId === tech.id && isToday(r.createdAt) && r.type === 'return' && r.notes !== "تصفير تلقائي" && r.notes !== "System Reset");
  const tExps = expenses.filter(e => e.techId === tech.id && isToday(e.createdAt) && e.notes !== "System Reset");

  
  const aggr = (arr) => {
    const m = {};
    arr.forEach(x => { m[x.itemId] = (m[x.itemId]||0) + x.quantity; });
    return Object.entries(m).map(([id,qty])=>{
      const it = items.find(i=>i.id===+id);
      return {name:it?.name||"مادة", qty, unit:it?.unit||""};
    });
  };
  const recDet = aggr(tRecs);
  const retDet = aggr(tRets);
  const expDet = aggr(tExps);
  
  const hasTodayActivity = recDet.length>0 || retDet.length>0 || expDet.length>0;

  return <Card style={{marginBottom:9,padding:"13px 15px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontWeight:700,fontSize:15}}>{tech.name}</div>
        {tech.phone&&<div style={{color:C.muted,fontSize:12}}>📱 {tech.phone}</div>}
        <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
          <Badge color={C.blue} small>👤 {tuData?.username||"—"}</Badge>
          <Badge color={C.purple} small>{bals.length} مادة</Badge>
          {low>0&&<Badge color={C.amber} small>⚠ {low}</Badge>}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        <Btn size="sm" color={C.blue} onClick={()=>onEdit({type:"bal",tech,bals,items})}>رصيد</Btn>
        <Btn size="sm" color={C.purple} onClick={()=>onEdit({type:"pw",tech,tu:tuData})}>🔑</Btn>
        <Btn size="sm" color={C.red} onClick={()=>onDelete(tech)}>🗑</Btn>
      </div>
    </div>
    
    {hasTodayActivity && <div style={{marginTop:12, paddingTop:12, borderTop:`1px dashed ${C.border}`}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
        <div style={{fontWeight:700, fontSize:12, color:C.muted}}>نشاط اليوم:</div>
        <button onClick={()=>onEdit({type:"activity", tech})} style={{background:`${C.blue}20`,color:C.blue,border:"none",borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer",fontWeight:700}}>✏️ تعديل النشاط</button>
      </div>
      {recDet.length > 0 && <div style={{marginBottom:6}}>
        <div style={{fontSize:11, color:C.green, fontWeight:700, marginBottom:3}}>📥 استلم:</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
          {recDet.map((d,i) => <Badge key={i} color={C.green} small>{d.name}: {d.qty} {d.unit}</Badge>)}
        </div>
      </div>}
      {retDet.length > 0 && <div style={{marginBottom:6}}>
        <div style={{fontSize:11, color:C.amber, fontWeight:700, marginBottom:3}}>↩️ أرجع:</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
          {retDet.map((d,i) => <Badge key={i} color={C.amber} small>{d.name}: {d.qty} {d.unit}</Badge>)}
        </div>
      </div>}
      {expDet.length > 0 && <div>
        <div style={{fontSize:11, color:C.amber, fontWeight:700, marginBottom:3}}>📤 صرف:</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
          {expDet.map((d,i) => <Badge key={i} color={C.amber} small>{d.name}: {d.qty} {d.unit}</Badge>)}
        </div>
      </div>}
    </div>}
  </Card>;
}
function EditTechItem({tech,item,onClose,toast,user}){
  const [type,setType]=useState("add");
  const [qty,setQty]=useState("");
  const [notes,setNotes]=useState("تعديل يدوي");
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    if(!qty||+qty<=0){toast("كمية غير صحيحة","error");return;}
    setSaving(true);
    try{
      if(type==="add"){
        await DB.receipts.add(tech.id, item.id, +qty, notes, user.id);
      }else{
        await DB.expenses.add({techId:tech.id, itemId:item.id, quantity:+qty, notes});
      }
      await DB.audit.add(user.displayName,"تعديل رصيد",`${type==="add"?"إضافة":"سحب"} ${qty} ${item.unit} للفني ${tech.name}`);
      await GS.reload("receipts","expenses");
      toast("✅ تم تعديل الرصيد");
      onClose();
    }catch(e){toast("خطأ: "+e.message,"error");}
    setSaving(false);
  };

  return <div>
    <div style={{background:C.bg2,borderRadius:9,padding:10,marginBottom:12,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontWeight:700}}>{item.name}</div>
      <Badge color={item.balance>0?C.green:C.red} small>حالي: {item.balance} {item.unit}</Badge>
    </div>
    
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      <button onClick={()=>setType("add")} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${type==="add"?C.green:C.border}`,background:type==="add"?`${C.green}15`:C.bg3,color:type==="add"?C.green:C.muted,fontWeight:700,cursor:"pointer"}}>➕ إضافة (استلام)</button>
      <button onClick={()=>setType("remove")} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${type==="remove"?C.red:C.border}`,background:type==="remove"?`${C.red}15`:C.bg3,color:type==="remove"?C.red:C.muted,fontWeight:700,cursor:"pointer"}}>➖ سحب (صرف)</button>
    </div>

    <Inp label="الكمية *" type="number" value={qty} onChange={setQty} placeholder="مثال: 5"/>
    <Inp label="ملاحظات" value={notes} onChange={setNotes}/>
    <Btn onClick={save} color={type==="add"?C.green:C.red} full loading={saving}>حفظ التعديل ✓</Btn>
  </div>;
}

function EditDailyActivity({tech, user, toast, onClose}) {
  const gs=useGS(["items","receipts","expenses"]);
  const [editing, setEditing] = useState(null);
  const [qty, setQty] = useState("");
  const [notes, setNotes] = useState("");
  const [saving, setSaving] = useState(false);

  if(!gs.receipts) return <Skel/>;
  
  const I = gs.items||[];
  
  const recs = (gs.receipts||[]).filter(r => r.techId === tech.id && isToday(r.createdAt));
  const exps = (gs.expenses||[]).filter(e => e.techId === tech.id && isToday(e.createdAt));
  
  const saveEdit = async () => {
    if(!qty || +qty < 1){ toast("الكمية غير صحيحة", "error"); return; }
    setSaving(true);
    try {
      if(editing.recordType === 'receipt') {
        await DB.receipts.upd(editing.id, +qty, notes);
      } else {
        await DB.expenses.upd(editing.id, +qty, notes);
      }
      await DB.audit.add(user.displayName, "تعديل عملية", `تعديل كمية ${editing.recordType==='receipt'?'استلام':'صرف'} إلى ${qty}`);
      await GS.reload("receipts","expenses");
      toast("✅ تم التعديل");
      setEditing(null);
    } catch(e){ toast("خطأ: "+e.message, "error"); }
    setSaving(false);
  };
  
  const doDel = async (record, type) => {
    if(!confirm("هل أنت متأكد من حذف هذه العملية نهائياً؟")) return;
    try {
      if(type === 'receipt') await DB.receipts.del(record.id);
      else await DB.expenses.del(record.id);
      await DB.audit.add(user.displayName, "حذف عملية", `تم حذف عملية ${type==='receipt'?'استلام':'صرف'} اليوم`);
      await GS.reload("receipts","expenses");
      toast("🗑 تم الحذف");
    } catch(e){ toast("خطأ: "+e.message, "error"); }
  };

  if(editing) {
    const item = I.find(i=>i.id === editing.itemId);
    return <div>
      <div style={{fontWeight:700, marginBottom:10}}>{editing.recordType==='receipt'?'📥 تعديل استلام':'📤 تعديل صرف'}: {item?.name}</div>
      <Inp label="الكمية" type="number" value={qty} onChange={setQty}/>
      <Inp label="ملاحظة" value={notes} onChange={setNotes}/>
      <div style={{display:"flex", gap:8, marginTop:10}}>
        <Btn onClick={saveEdit} color={C.blue} full loading={saving}>حفظ ✓</Btn>
        <Btn onClick={()=>setEditing(null)} color={C.muted} outline full>إلغاء</Btn>
      </div>
    </div>;
  }

  return <div>
    {recs.length === 0 && exps.length === 0 && <div style={{color:C.muted, textAlign:"center", padding:20}}>لا توجد عمليات اليوم</div>}
    
    {recs.length > 0 && <div style={{marginBottom:15}}>
      <div style={{color:C.green, fontWeight:700, marginBottom:8}}>📥 استلامات اليوم</div>
      {recs.map(r => {
        const item = I.find(i=>i.id===r.itemId);
        return <div key={'r'+r.id} style={{background:C.bg3, padding:"8px 12px", borderRadius:8, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700, fontSize:13}}>{item?.name} ({r.quantity} {item?.unit})</div>
            <div style={{fontSize:11, color:C.muted}}>{r.type==='return'?'↩️ استرجاع':'استلام'} {r.notes?` - ${r.notes}`:''}</div>
          </div>
          <div style={{display:"flex", gap:5}}>
            <button onClick={()=>{setEditing({...r, recordType:'receipt'}); setQty(String(r.quantity)); setNotes(r.notes||"");}} style={{background:`${C.blue}20`,color:C.blue,border:"none",borderRadius:5,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✏️</button>
            <button onClick={()=>doDel(r, 'receipt')} style={{background:`${C.red}20`,color:C.red,border:"none",borderRadius:5,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>🗑</button>
          </div>
        </div>;
      })}
    </div>}
    
    {exps.length > 0 && <div>
      <div style={{color:C.amber, fontWeight:700, marginBottom:8}}>📤 صرفيات اليوم</div>
      {exps.map(e => {
        const item = I.find(i=>i.id===e.itemId);
        return <div key={'e'+e.id} style={{background:C.bg3, padding:"8px 12px", borderRadius:8, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700, fontSize:13}}>{item?.name} ({e.quantity} {item?.unit})</div>
            <div style={{fontSize:11, color:C.muted}}>صرف {e.notes?` - ${e.notes}`:''}</div>
          </div>
          <div style={{display:"flex", gap:5}}>
            <button onClick={()=>{setEditing({...e, recordType:'expense'}); setQty(String(e.quantity)); setNotes(e.notes||"");}} style={{background:`${C.blue}20`,color:C.blue,border:"none",borderRadius:5,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✏️</button>
            <button onClick={()=>doDel(e, 'expense')} style={{background:`${C.red}20`,color:C.red,border:"none",borderRadius:5,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>🗑</button>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

function BarcodeScanner({onResult,onClose}){
  const vidRef=useRef();const [err,setErr]=useState("");const [scanning,setScanning]=useState(false);
  useEffect(()=>{
    let stream=null;let animFrame=null;
    const canvas=document.createElement("canvas");const ctx=canvas.getContext("2d");
    const start=async()=>{
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        vidRef.current.srcObject=stream;
        await vidRef.current.play();
        setScanning(true);
        const scan=()=>{
          if(!vidRef.current||!stream)return;
          canvas.width=vidRef.current.videoWidth;canvas.height=vidRef.current.videoHeight;
          ctx.drawImage(vidRef.current,0,0);
          try{
            // Use BarcodeDetector if available
            if('BarcodeDetector' in window){
              new BarcodeDetector().detect(canvas).then(codes=>{
                if(codes.length>0){onResult(codes[0].rawValue);stream.getTracks().forEach(t=>t.stop());}
                else animFrame=requestAnimationFrame(scan);
              });
            } else animFrame=requestAnimationFrame(scan);
          }catch{animFrame=requestAnimationFrame(scan);}
        };
        animFrame=requestAnimationFrame(scan);
      }catch(e){setErr("تعذر الوصول للكاميرا: "+e.message);}
    };
    start();
    return()=>{if(stream)stream.getTracks().forEach(t=>t.stop());if(animFrame)cancelAnimationFrame(animFrame);};
  },[]);
  return <div style={{textAlign:"center"}}>
    {err?<div style={{color:C.red,padding:20}}>{err}</div>:<>
      <video ref={vidRef} style={{width:"100%",borderRadius:12,maxHeight:300,objectFit:"cover",background:"#000"}} playsInline muted/>
      {scanning&&<div style={{color:C.cyan,fontSize:12,marginTop:8}}>📷 جارٍ المسح... وجّه الكاميرا نحو الباركود</div>}
      {!('BarcodeDetector' in window)&&<div style={{color:C.amber,fontSize:11,marginTop:6}}>⚠ المتصفح لا يدعم مسح الباركود تلقائياً</div>}
    </>}
    <Inp label="أو أدخل الرمز يدوياً" value="" onChange={v=>{if(v.trim())onResult(v.trim());}} placeholder="رمز الباركود..."/>
  </div>;
}

    const rec=R.filter(r=>r.techId===+tid&&r.itemId===+iid&&r.type!=='return').reduce((s,r)=>s+r.quantity,0);

    const sp=E.filter(e=>e.techId===+tid&&e.itemId===+iid).reduce((s,e)=>s+e.quantity,0);
    return rec-(sp+ret);
  };
  
  const addLine=()=>setRlines(l=>[...l,{iid:"",qty:1}]);
  const remLine=i=>setRlines(l=>l.filter((_,j)=>j!==i));
  const updLine=(i,k,v)=>setRlines(l=>l.map((x,j)=>j===i?{...x,[k]:v}:x));
  
  // Clean rlines when switching tab

  if(!hist)return <Skel/>;

    const valid=rlines.filter(l=>l.iid&&l.qty>0);
    if(!valid.length){toast("أضف مادة واحدة على الأقل","error");return;}
    
    // Validation for returns
    if(tab==="return"){
      for(let l of valid){
        const bal=getBal(l.iid);
        if(bal===null || l.qty>bal){
          const it=items.find(x=>x.id===+l.iid);
          toast(`الكمية المسترجعة لـ ${it?.name} أكبر من الرصيد الحالي (${bal})`,"error");
          return;
        }
      }
    }

    setSaving(true);
    try{
      const t=techs.find(x=>x.id===+tid);
      const actionName=tab==="receipt"?"تسليم مادة":"استرجاع عهدة";
      await Promise.all(valid.map(l=>{
        const it=items.find(x=>x.id===+l.iid);
        return DB.receipts.add(+tid,+l.iid,l.qty,notes,user.id,tab).then(()=>DB.audit.add(user.displayName,actionName,`${l.qty} ${it?.unit} ${tab==="receipt"?"-":"من"} ${t?.name}`));
      }));
      await GS.reload("receipts","expenses");
      setOk(`تم ${tab==="receipt"?"تسليم":"استرجاع"} ${valid.length} مادة ${tab==="receipt"?"للفني":"من الفني"} ${t?.name}`);
      setRlines([{iid:"",qty:1}]);
      if(tab!=="return")setNotes("");
      toast(`✅ تم تسجيل ${tab==="receipt"?"التسليم":"الاسترجاع"}`);
    }catch(e){toast("خطأ: "+e.message,"error");}
    setSaving(false);
  };
  
  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
      <div style={{fontWeight:800,fontSize:18}}>📦 إدارة العهدة</div>

      <button onClick={()=>setTab("return")} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",cursor:"pointer",background:tab==="return"?`${C.amber}20`:"transparent",color:tab==="return"?C.amber:C.muted,fontWeight:tab==="return"?700:400,fontSize:13}}>↩️ استرجاع عهدة</button>
    </div>

    <Card style={{padding:15,marginBottom:13,border:tab==="return"?`1px solid ${C.amber}50`:"none"}}>
      <div style={{color:tab==="return"?C.amber:C.green,fontWeight:700,fontSize:14,marginBottom:12}}>
        {tab==="receipt"?"تسليم مواد جديدة للفني":"استرجاع مواد من الفني للمخزن"}
      </div>
      <Sel label="الفني" value={tid} onChange={setTid} options={[{value:"",label:"اختر الفني"},...techs.map(t=>({value:String(t.id),label:t.name}))]}/>
      <div style={{color:C.muted,fontSize:11,marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:700}}>المواد المحددة</span>
        <span style={{color:C.blue,fontSize:10}}>{rlines.filter(l=>l.iid).length} مادة</span>
      </div>
      {rlines.map((ln,i)=>{const bal=getBal(ln.iid);const it=items.find(x=>x.id===+ln.iid);return <div key={i} style={{background:C.bg3,borderRadius:12,padding:"11px 12px",marginBottom:8,border:`1px solid ${ln.iid?C.blue+"40":C.border}`,transition:"border-color .2s"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
          <select value={ln.iid} onChange={e=>updLine(i,"iid",e.target.value)} style={{flex:1,background:C.bg4,border:`1px solid ${C.border}`,color:ln.iid?C.text:C.muted,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",appearance:"none",fontFamily:"inherit"}}>
            <option value="">اختر المادة…</option>

        </div>
        {bal !== null && (
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7, background: bal < 0 ? `${C.red}10` : "transparent", padding: bal < 0 ? "6px 10px" : "0", borderRadius: 8, border: bal < 0 ? `1px dashed ${C.red}40` : "none", transition: "all 0.3s"}}>
            <div style={{color: bal < 0 ? C.red : C.blue, fontSize: 11}}>
              الرصيد الحالي: <strong>{bal} {it?.unit}</strong> {bal <= 0 && <Badge color={C.red} small>نفذ</Badge>}
            </div>
            {bal < 0 && tab === "receipt" && (

      <button onClick={addLine} style={{width:"100%",background:`${C.blue}12`,border:`2px dashed ${C.blue}35`,color:C.blue,borderRadius:11,padding:"10px",fontSize:13,cursor:"pointer",fontWeight:700,marginBottom:11,fontFamily:"inherit"}}>+ إضافة مادة أخرى</button>

// ── Admin History ─────────────────────────────────────
function AdminHistory(){
  const [filter,setFilter]=useState("today");
  const [tab,setTab]=useState("live");
  const [expanded, setExpanded] = useState({});
  const [dateFilter,setDateFilter]=useState(today());
  const gs=useGS(["receipts","expenses","techs","items"]);



  if(!gs.receipts)return <Skel/>;
  
  // Memoize heavy transformations
  const { allReceipts, allExpGroups } = useMemo(() => {
    const T=gs.techs||[], I=gs.items||[], R=gs.receipts||[], E=gs.expenses||[];
    const recs = R.map(r=>({...r,type:"تسليم",techName:T.find(t=>t.id===r.techId)?.name||"—",itemName:I.find(i=>i.id===r.itemId)?.name||"—",unit:I.find(i=>i.id===r.itemId)?.unit||""})).sort((a,b)=>b.createdAt>a.createdAt?1:-1);
    const exps = E.map(e=>({...e,type:"صرفية",techName:T.find(t=>t.id===e.techId)?.name||"—",itemName:I.find(i=>i.id===e.itemId)?.name||"—",unit:I.find(i=>i.id===e.itemId)?.unit||""}));
    return { allReceipts: recs, allExpGroups: groupExpenses(exps) };
  }, [gs.receipts, gs.expenses, gs.techs, gs.items]);

  // Date filter
  const receipts=dateFilter?allReceipts.filter(r=>getDate(r)===dateFilter):allReceipts;
  const expGroups=dateFilter?allExpGroups.filter(g=>getDate(g[0])===dateFilter):allExpGroups;

  // Archive
  const archive=getArchive();

  return <div className="page" style={{padding:"16px 14px"}}>

    </div>

    {tab==="live"&&<>
      {/* Date filter */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11,background:C.bg3,borderRadius:10,padding:"8px 12px"}}>

        {dateFilter&&<button onClick={()=>setDateFilter("")} style={{background:`${C.red}20`,border:"none",color:C.red,borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>✕ كل السجل</button>}
        {dateFilter!==today()&&<button onClick={()=>setDateFilter(today())} style={{background:`${C.blue}20`,border:"none",color:C.blue,borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>اليوم</button>}
      </div>

      {/* Filter buttons */}
      <div style={{display:"flex",gap:5,marginBottom:11,flexWrap:"wrap"}}>
        {[["all","الكل"],["r","تسليمات"],["e","صرفيات"]].map(([v,l])=><button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 15px",borderRadius:18,border:"none",fontSize:12,cursor:"pointer",background:filter===v?C.blue:C.bg3,color:filter===v?"#fff":C.muted,fontWeight:filter===v?700:400}}>{l}{filter===v&&` (${v==="e"?expGroups.length:v==="r"?receipts.length:receipts.length+expGroups.length})`}</button>)}
      </div>

      {dateFilter&&<div style={{color:C.cyan,fontSize:12,marginBottom:9,textAlign:"center"}}>عرض سجل يوم {dateFilter}</div>}

      {(filter==="all"||filter==="r")&&receipts.length>0&&<>{filter==="all"&&<div style={{color:C.muted,fontSize:11,marginBottom:7}}>── تسليمات ({receipts.length}) ──</div>}{receipts.slice(0,80).map((op,i)=><OpsRow key={i} op={op}/>)}</>}
      {(filter==="all"||filter==="e")&&<>{filter==="all"&&expGroups.length>0&&<div style={{color:C.muted,fontSize:11,marginBottom:7,marginTop:3}}>── صرفيات ({expGroups.length}) ──</div>}{expGroups.length===0&&filter==="e"&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد صرفيات</div>}{expGroups.slice(0,80).map((g,i)=><GroupedRow key={i} group={g} allItems={I}/>)}</>}
      {filter==="r"&&receipts.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد تسليمات</div>}
      {filter==="all"&&receipts.length===0&&expGroups.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد سجلات</div>}

    {tab==="archive"&&<>

              {recs.length>0&&<div style={{marginBottom:10}}>

                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {recs.map((r,i)=><div key={i} style={{fontSize:12,display:"flex",justifyContent:"space-between"}}><span style={{color:C.muted}}>{r.techName}</span><span>{r.quantity} {r.unit} {r.itemName}</span></div>)}

              </div>}
              {rets.length>0&&<div style={{marginBottom:10}}>
                <div style={{color:C.amber,fontSize:12,fontWeight:700,marginBottom:6}}>↩️ استرجاعات</div>

                </div>
              </div>}
              {recs.length===0&&rets.length===0&&exps.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center"}}>لا توجد تفاصيل</div>}
            </div>}
          </div>
        })}
    </>}
  </div>;
}

              {items.map(it2=><option key={it2.id} value={String(it2.id)}>{it2.name} ({it2.unit})</option>)}
            </select>
            {rlines.length>1&&<button onClick={()=>remLine(i)} style={{background:`${C.red}20`,border:`1px solid ${C.red}40`,color:C.red,borderRadius:7,width:32,height:32,cursor:"pointer",fontSize:15,flexShrink:0}}>✕</button>}
          </div>
          {bal!==null&&<div style={{color:bal<0?C.red:C.blue,fontSize:11,marginBottom:7}}>رصيد الفني المتوفر: <strong>{bal} {it?.unit}</strong>{bal<=0&&<Badge color={C.red} small>لا يوجد رصيد</Badge>}</div>}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{color:C.muted,fontSize:11,flexShrink:0}}>الكمية المصروفة:</div>
            <QtyPick value={ln.qty} onChange={v=>updLine(i,"qty",v)}/>
          </div>
        </div>;
      })}
      <button onClick={addLine} style={{width:"100%",background:`${C.blue}12`,border:`2px dashed ${C.blue}35`,color:C.blue,borderRadius:11,padding:"10px",fontSize:13,cursor:"pointer",fontWeight:700,marginBottom:11,fontFamily:"inherit"}}>+ إضافة مادة أخرى للصرفية</button>
      
      {ok&&<div style={{background:`${C.green}15`,border:`1px solid ${C.green}40`,borderRadius:9,padding:"9px 13px",color:C.green,fontSize:13,marginBottom:10,fontWeight:700}}>✅ {ok}</div>}
      <Btn onClick={submit} color={C.blue} full size="lg" loading={saving}>💳 تسجيل الصرفية المجمعة</Btn>
    </Card>
  </div>;
}

// ── Admin Reports ─────────────────────────────────────
function AdminReports({toast}){
  const gs=useGS(["techs","items","receipts","expenses"]);
  const [tab, setTab] = useState("daily");
  const [expandedDate, setExpandedDate] = useState({});

  if(!gs.receipts) return <Skel/>;
  
  const T = (gs.techs || []).filter(t=>t.is_active!==false);
  const I = (gs.items || []).filter(i=>i.is_active!==false);
  const R = gs.receipts || [];
  const E = gs.expenses || [];
  
  // Tab 1: Daily Activity
  const todayR = R.filter(r => isToday(r.createdAt));
  const todayE = E.filter(e => isToday(e.createdAt));
  
  // Tab 2: Archive
  const archive = getArchive();
  
  // Tab 3: Insights
  const techExpSum = T.map(t => ({...t, totalExp: E.filter(e => e.techId === t.id).reduce((s,e)=>s+e.quantity,0)}));
  const topTech = techExpSum.reduce((a,b) => b.totalExp > a.totalExp ? b : a, techExpSum[0] || {});
  
  const itemExpSum = {};
  E.forEach(e => {
    itemExpSum[e.itemId] = (itemExpSum[e.itemId] || 0) + e.quantity;
  });
  const topItems = Object.entries(itemExpSum)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 3)
    .map(([id, qty]) => {
      const it = I.find(i=>i.id===+id);
      return {name: it?.name || "—", qty, unit: it?.unit || ""};
    });
    
  const activeDays = new Set(E.map(e => e.createdAt?.slice(0,10)).filter(Boolean)).size || 1;
  const totalExpQty = E.reduce((s,e) => s+e.quantity, 0);
  const avgDispense = (totalExpQty / activeDays).toFixed(1);

  const exportDaily = () => {
  if (todayR.length === 0 && todayE.length === 0) {
    if(typeof toast === 'function') toast("لا توجد بيانات لتصديرها اليوم!", "warn");
    return;
  }

  const reportData = [];
  let totalReceipts = 0;
  let totalExpenses = 0;

  // 1. بيانات الاستلامات
  todayR.forEach(r => {
    const it = I.find(i => i.id === r.itemId);
    const t = T.find(x => x.id === r.techId);
    const isRet = r.type === 'return';
    if(!isRet) totalReceipts += r.quantity;

    reportData.push({
      "التوقيت": r.createdAt?.slice(11, 16) || "",
      "نوع العملية": isRet ? "↩️ استرجاع" : "📥 تسليم",
      "الفني": t?.name || "—",
      "المادة": it?.name || "—",
      "الكمية": r.quantity,
      "الوحدة": it?.unit || "",
      "ملاحظات": r.notes || ""
    });
  });

  // 2. بيانات الصرفيات
  todayE.forEach(e => {
    const it = I.find(i => i.id === e.itemId);
    const t = T.find(x => x.id === e.techId);
    totalExpenses += e.quantity;

    reportData.push({
      "التوقيت": e.createdAt?.slice(11, 16) || "",
      "نوع العملية": "📤 صرفية",
      "الفني": t?.name || "—",
      "المادة": it?.name || "—",
      "الكمية": e.quantity,
      "الوحدة": it?.unit || "",
      "ملاحظات": e.notes || ""
    });
  });

  reportData.push({}); 
  reportData.push({
    "التوقيت": "📊 الإجمالي",
    "نوع العملية": `مجموع التسليم: ${totalReceipts}`,
    "الفني": `مجموع الصرف: ${totalExpenses}`,
    "المادة": "", "الكمية": "", "الوحدة": "", "ملاحظات": ""
  });

  const ws = XLSX.utils.json_to_sheet(reportData);
  ws['!dir'] = 'rtl';
  ws['!cols'] = [
    {wch: 10}, {wch: 15}, {wch: 18}, {wch: 20}, 
    {wch: 8}, {wch: 8}, {wch: 30}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "تقرير اليوم");
  XLSX.writeFile(wb, `SpaceLink_Daily_${today()}.xlsx`);
  
  if(typeof toast === 'function') toast("✅ تم تحميل التقرير بنجاح");
};

  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
      <div style={{fontWeight:800,fontSize:18}}>📈 التقارير والإحصائيات</div>
      {tab === "daily" && <Btn onClick={exportDaily} color={C.green} icon="📊">تصدير Excel</Btn>}
    </div>
    
    <div style={{display:"flex",gap:4,marginBottom:14,background:C.bg2,borderRadius:12,padding:4,border:`1px solid ${C.border}`}}>
      {[
        {id: "daily", label: "نشاط اليوم", icon: "📅"},
        {id: "archive", label: "الأرشيف", icon: "🗃"},
        {id: "insights", label: "رؤى ذكية", icon: "🤖"}
      ].map(t => (
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",cursor:"pointer",background:tab===t.id?`${C.blue}20`:"transparent",color:tab===t.id?C.blue:C.muted,fontWeight:tab===t.id?700:400,fontSize:12}}>
          {t.icon} {t.label}
        </button>
      ))}
    </div>

{tab === "daily" && (
      <div style={{display:"flex", flexDirection:"column", gap:10}}>
        {T.map(t => {
          const tRecs = todayR.filter(r => r.techId === t.id && r.type !== 'return');
          const tRets = todayR.filter(r => r.techId === t.id && r.type === 'return');
          const tExps = todayE.filter(e => e.techId === t.id);

          const aggr = (arr) => {
            const m = {};
            arr.forEach(x => { m[x.itemId] = (m[x.itemId]||0) + x.quantity; });
            return Object.entries(m).map(([id,qty])=>{
              const it = I.find(i=>i.id===+id);
              return {name:it?.name||"—", qty, unit:it?.unit||""};
            });
          };

          const recDet = aggr(tRecs);
          const retDet = aggr(tRets);
          const expDet = aggr(tExps);

          const hasActivity = recDet.length > 0 || retDet.length > 0 || expDet.length > 0;

          return <Card key={t.id} style={{padding:"12px 14px"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div style={{fontWeight:700, fontSize:14}}>{t.name}</div>
              {!hasActivity && <Badge color={C.muted} small>لا يوجد نشاط</Badge>}
            </div>
            {hasActivity && <div style={{display:"flex", flexDirection:"column", gap:6, marginTop:10}}>
              {recDet.length > 0 && <div style={{display:"flex", flexWrap:"wrap", gap:4, alignItems:"center"}}>
                <span style={{fontSize:11, color:C.green, fontWeight:700}}>📥 استلم:</span>
                {recDet.map((d,i) => <Badge key={i} color={C.green} small>{d.name}: {d.qty} {d.unit}</Badge>)}
              </div>}
              {retDet.length > 0 && <div style={{display:"flex", flexWrap:"wrap", gap:4, alignItems:"center"}}>
                <span style={{fontSize:11, color:C.amber, fontWeight:700}}>↩️ أرجع:</span>
                {retDet.map((d,i) => <Badge key={i} color={C.amber} small>{d.name}: {d.qty} {d.unit}</Badge>)}
              </div>}
              {expDet.length > 0 && <div style={{display:"flex", flexWrap:"wrap", gap:4, alignItems:"center"}}>
                <span style={{fontSize:11, color:C.red, fontWeight:700}}>📤 صرف:</span>
                {expDet.map((d,i) => <Badge key={i} color={C.red} small>{d.name}: {d.qty} {d.unit}</Badge>)}
              </div>}
            </div>}
          </Card>;
        })}
      </div>
    )}

    {tab === "archive" && (
      <div>
        {archive.length === 0 ? (
          <div style={{color:C.muted,textAlign:"center",padding:40}}>لا يوجد أرشيف</div>
        ) : (
          archive.map((day, di) => {
            const isExp = expandedDate[day.date];
            const recs = day.receipts.filter(r=>r.type!=='return');
            const rets = day.receipts.filter(r=>r.type==='return');
            const exps = day.expGroups.flatMap(g=>g);
            return <div key={di} style={{marginBottom:10,background:C.bg3,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
              <div onClick={()=>setExpandedDate(p=>({...p,[day.date]:!p[day.date]}))} style={{padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",background:isExp?C.bg4:'transparent'}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:28,height:28,borderRadius:8,background:`${C.blue}20`,color:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📅</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{day.date}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{recs.length} تسليم · {exps.length} صرفية</div>
                  </div>
                </div>
                <div style={{transform:isExp?"rotate(180deg)":"none",transition:"transform 0.2s",color:C.muted}}>▼</div>
              </div>
              {isExp && <div style={{padding:"14px",borderTop:`1px solid ${C.border}`}}>
                {recs.length>0&&<div style={{marginBottom:10}}>
                  <div style={{color:C.green,fontSize:12,fontWeight:700,marginBottom:6}}>📥 استلامات</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {recs.map((r,i)=><div key={i} style={{fontSize:12,display:"flex",justifyContent:"space-between"}}><span style={{color:C.text}}>{r.techName}</span><span style={{color:C.green}}>{r.quantity} {r.unit} {r.itemName}</span></div>)}
                  </div>
                </div>}
                {rets.length>0&&<div style={{marginBottom:10}}>
                  <div style={{color:C.amber,fontSize:12,fontWeight:700,marginBottom:6}}>↩️ استرجاعات</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {rets.map((r,i)=><div key={i} style={{fontSize:12,display:"flex",justifyContent:"space-between"}}><span style={{color:C.text}}>{r.techName}</span><span style={{color:C.amber}}>{r.quantity} {r.unit} {r.itemName}</span></div>)}
                  </div>
                </div>}
                {exps.length>0&&<div>
                  <div style={{color:C.amber,fontSize:12,fontWeight:700,marginBottom:6}}>📤 صرفيات</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {exps.map((e,i)=><div key={i} style={{fontSize:12,display:"flex",justifyContent:"space-between"}}><span style={{color:C.text}}>{e.techName}</span><span style={{color:C.amber}}>{e.quantity} {e.unit} {e.itemName}</span></div>)}
                  </div>
                </div>}
                {recs.length===0&&rets.length===0&&exps.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center"}}>لا توجد تفاصيل</div>}
              </div>}
            </div>;
          })
        )}
      </div>
    )}

    {tab === "insights" && (
      <div style={{display:"grid", gap:12}}>
        <Card style={{padding:16}}>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
            <span style={{fontSize:24}}>🏆</span>
            <div>
              <div style={{color:C.muted, fontSize:12}}>الفني الأكثر نشاطاً</div>
              <div style={{fontWeight:700, fontSize:16, color:C.green}}>{topTech?.name || "—"}</div>
            </div>
          </div>
          <div style={{fontSize:12, color:C.muted}}>إجمالي صرفياته: <strong style={{color:C.text}}>{topTech?.totalExp || 0}</strong> مادة</div>
        </Card>
        
        <Card style={{padding:16}}>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
            <span style={{fontSize:24}}>🔥</span>
            <div>
              <div style={{color:C.muted, fontSize:12}}>المواد الأكثر استهلاكاً</div>
              <div style={{fontWeight:700, fontSize:14, color:C.amber}}>أكثر 3 مواد صرفاً</div>
            </div>
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {topItems.length > 0 ? topItems.map((it, i) => (
              <div key={i} style={{display:"flex", justifyContent:"space-between", fontSize:13, background:C.bg4, padding:"6px 10px", borderRadius:6}}>
                <span>{it.name}</span>
                <span style={{color:C.amber, fontWeight:700}}>{it.qty} {it.unit}</span>
              </div>
            )) : <div style={{fontSize:12, color:C.muted}}>لا توجد بيانات</div>}
          </div>
        </Card>
        
        <Card style={{padding:16}}>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
            <span style={{fontSize:24}}>⏱️</span>
            <div>
              <div style={{color:C.muted, fontSize:12}}>معدل الصرف</div>
              <div style={{fontWeight:700, fontSize:16, color:C.blue}}>{avgDispense} وحدة / يوم نشط</div>
            </div>
          </div>
          <div style={{fontSize:12, color:C.muted}}>تم الحساب على أساس <strong style={{color:C.text}}>{activeDays}</strong> يوم عمل نشط</div>
        </Card>
      </div>
    )}
  </div>;
}

// ── Admin App ─────────────────────────────────────────
function AdminApp({user,toast:showToast,doLogout}){
  const [page,setPage]=useState("dash");
  const navRef=useRef(null);
  
  useEffect(()=>{
    const el=navRef.current;if(!el)return;
    const h=e=>{
      const isNav=el.contains(e.target);
      if(isNav && Math.abs(e.deltaY)>Math.abs(e.deltaX)){
        e.preventDefault();
        el.scrollLeft+=e.deltaY;
      }
    };
    document.addEventListener('wheel',h,{passive:false});
    return()=>document.removeEventListener('wheel',h);
  });

  const adminTabs=[
    {id:"dash",icon:"📊",label:"Dashboard"},
    {id:"techs",icon:"👷",label:"الفنيين"},
    {id:"items",icon:"🔧",label:"المعدات"},
    {id:"receipt",icon:"📦",label:"تسليم"},
    {id:"expense",icon:"💳",label:"صرفية"},
    {id:"history",icon:"📋",label:"السجل"},
    {id:"reports",icon:"📈",label:"تقارير"}
  ];

  const color=C.blue;

  const renderPage=()=>{switch(page){
    case"dash":return<AdminDash user={user} toast={showToast}/>;
    case"techs":return<AdminTechs user={user} toast={showToast}/>;
    case"items":return<AdminItems user={user} toast={showToast}/>;
    case"receipt":return<AdminReceipt user={user} toast={showToast}/>;
    case"expense":return<AdminExpense user={user} toast={showToast}/>;
    case"history":return<AdminHistory/>;
    case"reports":return<AdminReports toast={showToast}/>;
    default:return<AdminDash user={user} toast={showToast}/>;
  }};

  return <>
    <style>{css}</style>
    {/* Desktop sidebar */}
    <div className="sb">
      <div style={{padding:"20px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
        <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.blueD},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🌐</div>
        <div><div style={{fontWeight:800,fontSize:15}}>Space Link</div><div style={{color:C.muted,fontSize:10}}>نظام إدارة مكتب الإنترنت</div></div>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {adminTabs.map(t=><button key={t.id} className={`sb-item${page===t.id?" ac":""}`} onClick={()=>setPage(t.id)}>
          <span style={{fontSize:17}}>{t.icon}</span><span>{t.label}</span>
        </button>)}
      </div>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:7}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><BaghdadClock/><RefreshDot/><RTDot/><OfflineBadge/><PWAInstall/></div>
        <Badge color={color} small>🔑 {user.displayName||user.username}</Badge>
        <button onClick={doLogout} style={{background:`${C.red}15`,border:`1px solid ${C.red}40`,color:C.red,borderRadius:8,padding:"8px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",width:"100%"}}>🚪 خروج</button>
      </div>
    </div>
    {/* Main content */}
    <div className="app-wrap">
      <div className="mob-hdr" style={{position:"sticky",top:0,zIndex:300,background:C.bg2,borderBottom:`1px solid ${C.border}`}}>
        <div style={{padding:"9px 15px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}><Dot c={color} pulse/><span style={{fontWeight:700,fontSize:13}}>Space Link</span></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <BaghdadClock/><RefreshDot/><RTDot/><OfflineBadge/><PWAInstall/>
            <Badge color={color} small>🔑 {user.displayName||user.username}</Badge>
            <button onClick={doLogout} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>خروج</button>
          </div>
        </div>
      </div>
      <div style={{paddingBottom:80}}>{renderPage()}</div>
    </div>
    {/* Mobile bottom nav */}
    <nav className="bnav" style={{position:"fixed",bottom:0,left:0,width:"100%",background:C.bg2,borderTop:`1px solid ${C.border}`,zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
      <div ref={navRef} className="hnav">
        {adminTabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flexShrink:0,flex:"1 0 auto",minWidth:60,padding:"9px 5px 7px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",borderTop:`2px solid ${page===t.id?color:"transparent"}`}}>
          <span style={{fontSize:18}}>{t.icon}</span><span style={{fontSize:9,color:page===t.id?color:C.muted,fontWeight:page===t.id?700:400,whiteSpace:"nowrap"}}>{t.label}</span>
        </button>)}
      </div>
    </nav>
  </>;
}

// ── App Boot ──────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{
    try{const s=localStorage.getItem('sl_session');return s?JSON.parse(s):null;}catch{return null;}
  });
  const [toasts,setToasts]=useState([]);
  const showToast=(msg,type="success")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  };

  // Initialize Realtime on mount
  useEffect(()=>{
    RT.init();
    RT.subscribe();
    return()=>RT.unsubscribe();
  },[]);

  const doLogin=(u)=>{
    setUser(u);
  };

  const doLogout=()=>{
    localStorage.removeItem('sl_session');
    setUser(null);
  };

  if(!user) return (<><style>{css}</style><ToastStack toasts={toasts}/><Login onLogin={doLogin}/></>);
  return <>
    <ToastStack toasts={toasts}/>
    <AdminApp user={user} toast={showToast} doLogout={doLogout}/>
  </>;
}
