<script>
// ── Service Worker Cache ─────────────────────────────
if('serviceWorker' in navigator){
  const sw=`const C='sl-v4',A=['https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{if(e.request.url.includes('supabase'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open(C).then(x=>x.put(e.request,c));}return res;})));});`;
  try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));}catch{}
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');s.src=src;
    s.onload=res;s.onerror=()=>rej(new Error('Failed: '+src));
    document.head.appendChild(s);
  });
}

function showError(msg){
  document.getElementById('loading').innerHTML=`<div style="color:#F75D5D;text-align:center;padding:24px;font-family:Tahoma">
    <div style="font-size:36px;margin-bottom:10px">⚠️</div>
    <div style="font-weight:700;margin-bottom:6px;font-size:16px">خطأ في التحميل</div>
    <div style="font-size:12px;color:#5A6A85;margin-bottom:12px">تأكد من اتصال الإنترنت</div>
    <button onclick="localStorage.removeItem('sl_c');location.reload()" style="background:#4F8EF7;border:none;color:#fff;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px">🔄 إعادة تحميل</button>
    <div style="font-size:10px;color:#5A6A85;margin-top:8px;max-width:300px;word-break:break-all">${msg}</div></div>`;
}

async function boot(){
  try{
    await Promise.all([
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'),
    ]);
    const src=document.getElementById('app-src').textContent;
    let hash=0;for(let i=0;i<src.length;i+=80)hash=(hash*31+src.charCodeAt(i))>>>0;
    const key='sl_c_'+hash;
    let compiled=null;
    try{compiled=localStorage.getItem(key);}catch{}
    if(!compiled){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js');
      await new Promise(r=>setTimeout(r,0));
      compiled=Babel.transform(src,{presets:['react'],compact:true,comments:false}).code;
      try{
        Object.keys(localStorage).filter(k=>k.startsWith('sl_c_')).forEach(k=>localStorage.removeItem(k));
        localStorage.setItem(key,compiled);
      }catch{}
    }
    const App=new Function('React','ReactDOM',compiled+'\nreturn App;')(React,ReactDOM);
    document.getElementById('loading').style.display='none';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  }catch(e){showError(e.message);}
}
boot();
</script>

// ── Supabase ─────────────────────────────────────────
async function sbFetch(url,opts,tries=3){
  for(let i=0;i<tries;i++){
    try{
      const r=await fetch(url,opts);
      if(!r.ok)throw new Error(await r.text());
      return r.json();
    }catch(e){
      if(i===tries-1)throw e;
      await new Promise(r=>setTimeout(r,800*(i+1)));
    }
  }
}
const sb={
  q:(t,f='')=>sbFetch(`${SB_URL}/rest/v1/${t}${f?'?'+f:''}`,{headers:HDR}),
  ins:(t,d)=>sbFetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...HDR,Prefer:'return=representation'},body:JSON.stringify(d)}).then(r=>Array.isArray(r)?r[0]:r),
  upd:(t,f,d)=>sbFetch(`${SB_URL}/rest/v1/${t}?${f}`,{method:'PATCH',headers:{...HDR,Prefer:'return=representation'},body:JSON.stringify(d)},2),

const mi=r=>r?{id:r.id,name:r.name,unit:r.unit,threshold:r.threshold,category:r.category,image:r.image}:null;

// ── Global Store (stale-while-revalidate) ────────────
const GS={
  _d:{},_p:{},_cbs:[],_status:'',
  on(fn){this._cbs.push(fn);return()=>{this._cbs=this._cbs.filter(c=>c!==fn)};},
  emit(){this._cbs.forEach(fn=>fn({...this._d}));},
  get(){return this._d;},
  loadStale(){
    try{
      const s=localStorage.getItem('sl_gs2');
      if(s)Object.assign(this._d,JSON.parse(s));
    }catch{}
  },
  persist(){
    try{const o={};['items','techs','receipts','expenses'].forEach(k=>{if(this._d[k])o[k]=this._d[k];});localStorage.setItem('sl_gs2',JSON.stringify(o));}catch{}
  },
  async load(keys){
    const all=keys||['items','techs','receipts','expenses'];
    const need=all.filter(k=>!this._p[k]);
    if(!need.length)return this._d;
    need.forEach(k=>this._p[k]=true);
    const map={items:()=>DB.items.all(),techs:()=>DB.techs.all(),techUsers:()=>DB.techUsers.all(),receipts:()=>DB.receipts.all(),expenses:()=>DB.expenses.all()};
    this._status='loading';this.emit();
    let ok=true;
    await Promise.all(need.map(async k=>{
      if(map[k])try{this._d[k]=await map[k]();}
      catch(e){ok=false;need.forEach(x=>delete this._p[x]);console.warn('GS:',k,e.message);}
    }));
    this._status=ok?'ok':'error';
    this.emit();
    if(ok)this.persist();
    return this._d;
  },
  inval(...keys){keys.forEach(k=>{delete this._d[k];delete this._p[k];LC.del(k);});},
  async reload(...keys){this.inval(...keys);return this.load(keys);},
  async forceReload(){this._d={};this._p={};['items','techs','receipts','expenses'].forEach(k=>LC.del(k));return this.load();},
};
GS.loadStale();

function useGS(keys){
  const [d,setD]=useState(()=>({...GS.get()}));
  useEffect(()=>{const off=GS.on(x=>setD({...x}));GS.load(keys);return off;},[]);
  return d;
}

// ── Helpers ───────────────────────────────────────────
function calcBals(techId,items,receipts,expenses){
  return items.map(item=>{
    const rec=(receipts||[]).filter(r=>r.techId===+techId&&r.itemId===item.id).reduce((s,r)=>s+r.quantity,0);
    const sp=(expenses||[]).filter(e=>e.techId===+techId&&e.itemId===item.id).reduce((s,e)=>s+e.quantity,0);
    return rec>0||sp>0?{...item,received:rec,spent:sp,balance:rec-sp}:null;
  }).filter(Boolean);
}
function groupExpenses(expenses){
  const m={};
  expenses.forEach(e=>{const k=e.groupId||(e.createdAt+'_'+(e.subscriberName||''));if(!m[k])m[k]=[];m[k].push(e);});
  return Object.values(m).sort((a,b)=>b[0].createdAt>a[0].createdAt?1:-1);
}
function buildReportData(gs){
  const T=gs.techs||[],E=gs.expenses||[],R=gs.receipts||[],I=gs.items||[];
  let totalRemaining=0;
  const techStats=T.map(t=>{
    const b=calcBals(t.id,I,R,E);
    const rem=b.reduce((s,x)=>s+x.balance,0);totalRemaining+=rem;
    return{id:t.id,name:t.name,received:b.reduce((s,x)=>s+x.received,0),spent:b.reduce((s,x)=>s+x.spent,0),remaining:rem,items:b.length,low:b.filter(x=>x.balance>=0&&x.balance<=x.threshold).length};
  });
  const um={};E.forEach(e=>{const it=I.find(i=>i.id===e.itemId);if(!it)return;um[e.itemId]=um[e.itemId]||{name:it.name,unit:it.unit,total:0};um[e.itemId].total+=e.quantity;});
  const topItems=Object.values(um).sort((a,b)=>b.total-a.total);
  const days14=[...Array(14)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
  const lineData=days14.map(d=>({day:d.slice(5),قيمة:E.filter(e=>e.createdAt?.startsWith(d)||e.createdAt?.includes(d.replace(/-/g,'/'))).reduce((s,e)=>s+e.quantity,0)}));
  return{techs:T,expenses:E,receipts:R,items:I,techStats,topItems,lineData,totalRemaining};
}

const Dot=({c,pulse:p})=><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:c,boxShadow:`0 0 6px ${c}`,animation:p?"pulse 2s ease infinite":"none",flexShrink:0}}/>;

const Card=({children,style,onClick,glow})=><div onClick={onClick} style={{background:C.bg2,border:`1px solid ${glow?glow+"40":C.border}`,borderRadius:16,overflow:"hidden",boxShadow:glow?`0 0 20px ${glow}15`:"none",...style,cursor:onClick?"pointer":"default"}}>{children}</div>;
const Btn=({children,onClick,color=C.blue,size="md",full,disabled,outline,icon,loading,style:sx})=>{

    {loading?<Spin c={outline?color:"#fff"} s={14}/>:<>{icon&&<span>{icon}</span>}{children}</>}
  </button>;
};
const Inp=({label,value,onChange,type="text",placeholder,rows})=>(

      let w=img.width,h=img.height;if(w>max){h=Math.round(h*max/w);w=max;}if(h>max){w=Math.round(w*max/h);h=max;}

// ── Simple Charts ─────────────────────────────────────
function BarSVG({data,keys,colors,h=160}){
  if(!data?.length)return null;
  const vals=data.flatMap(d=>keys.map(k=>d[k]||0));const max=Math.max(...vals,1);
  const W=300,pad=28,sw=(W-pad)/data.length,bw=Math.max(4,(sw/keys.length)-3);
  return <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h}}>
    {data.map((d,i)=>keys.map((k,ki)=>{const v=d[k]||0;const bh=Math.max(2,(v/max)*(h-pad-8));const x=pad+i*sw+ki*(bw+3);return <g key={k+i}><rect x={x} y={h-pad-bh} width={bw} height={bh} fill={colors[ki]} rx={2}/></g>;}))}{data.map((d,i)=><text key={i} x={pad+i*sw+sw/2} y={h-6} textAnchor="middle" fontSize={9} fill={C.muted}>{d.day||d.name||""}</text>)}
  </svg>;
}
function LineSVG({data,dataKey,color,h=140}){
  if(!data?.length)return null;
  const vals=data.map(d=>d[dataKey]||0);const max=Math.max(...vals,1);const W=300,pad=18;
  const pts=data.map((d,i)=>`${pad+i*((W-2*pad)/(data.length-1||1))},${pad+(1-(d[dataKey]||0)/max)*(h-2*pad)}`);
  return <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h}}>
    <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round"/>
    {data.map((d,i)=>{const x=pad+i*((W-2*pad)/(data.length-1||1));return <text key={i} x={x} y={h-2} textAnchor="middle" fontSize={9} fill={C.muted}>{d.day||""}</text>;})}
  </svg>;
}
function PieSVG({data,size=120}){
  if(!data?.length)return null;
  const tot=data.reduce((s,d)=>s+d.value,0)||1;let angle=-Math.PI/2;const r=44,cx=size/2,cy=size/2;
  return <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size}}>
    {data.map((d,i)=>{const sl=(d.value/tot)*Math.PI*2;const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+sl),y2=cy+r*Math.sin(angle+sl),lg=sl>Math.PI?1:0;const path=`M${cx} ${cy}L${x1} ${y1}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}Z`;angle+=sl;return <path key={i} d={path} fill={d.fill}/>;})}<circle cx={cx} cy={cy} r={22} fill={C.bg2}/>
  </svg>;
}

// ── Admin Dash ────────────────────────────────────────
function AdminDash(){

  const allBals=T.flatMap(t=>calcBals(t.id,I,R,E));
  const lowMap=new Map();allBals.filter(b=>b.balance>=0&&b.balance<=b.threshold).forEach(x=>lowMap.set(x.id,x));const low=[...lowMap.values()];
  const um={};E.forEach(e=>{const it=I.find(i=>i.id===e.itemId);if(!it)return;um[e.itemId]=um[e.itemId]||{name:it.name,unit:it.unit,total:0};um[e.itemId].total+=e.quantity;});
  const top=Object.values(um).sort((a,b)=>b.total-a.total).slice(0,6);
  const days7=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);});

  const pie=top.slice(0,5).map((it,i)=>({name:it.name,value:it.total,fill:C.chart[i]}));
  const totR=R.reduce((s,r)=>s+r.quantity,0),totS=E.reduce((s,e)=>s+e.quantity,0);
  const techSum=T.map(t=>{const b=calcBals(t.id,I,R,E);return{...t,bal:b.reduce((s,x)=>s+x.balance,0),low:b.filter(x=>x.balance>=0&&x.balance<=x.threshold).length,cnt:b.length};});

      <div style={{color:C.amber,fontWeight:700,fontSize:13,marginBottom:5}}>⚠ {low.length} مواد تحت حد التنبيه</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{low.map((a,i)=><Badge key={i} color={C.amber} small>{a.name}: {a.balance} {a.unit}</Badge>)}</div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
      {[["🔧",I.length,C.purple,"المعدات"],["👷",T.length,C.blue,"الفنيين"],["📦",totR,C.green,"إجمالي استلام"],["📤",totS,C.amber,"إجمالي صرف"]].map(([ic,v,c,l])=><Card key={l} style={{padding:"13px 15px"}} glow={c}><div style={{fontSize:20,marginBottom:3}}>{ic}</div><div style={{fontSize:22,fontWeight:700,color:c,lineHeight:1}}>{v}</div><div style={{color:C.muted,fontSize:11,marginTop:2}}>{l}</div></Card>)}
    </div>
    <Card style={{padding:"14px 11px",marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:C.muted}}>📊 آخر 7 أيام</div>
      <BarSVG data={daily} keys={["تسليم","صرفية"]} colors={[C.green,C.amber]} h={150}/>
    </Card>
    {top.length>0&&<Card style={{padding:"14px 11px",marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:12,marginBottom:9,color:C.muted}}>🏆 الأكثر استخداماً</div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <PieSVG data={pie} size={110}/>
        <div style={{flex:1}}>{top.slice(0,5).map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,borderRadius:"50%",background:C.chart[i]}}/><span style={{fontSize:12}}>{it.name}</span></div>
          <span style={{fontSize:12,color:C.chart[i],fontWeight:600}}>{it.total}</span>
        </div>)}</div>
      </div>
    </Card>}
    <Card style={{padding:"14px 13px"}}>
      <div style={{fontWeight:700,fontSize:12,marginBottom:9,color:C.muted}}>👷 ملخص الفنيين</div>
      {techSum.length===0?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:14}}>لا يوجد فنيين</div>
      :techSum.map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>

  </div>;

// ── Receipt History by Day ────────────────────────────
function ReceiptByDay({hist,techs,items}){
  const [selDate,setSelDate]=useState(today);
  const getD=r=>(r.createdAt||"").slice(0,10).replace(/\//g,"-");
  const dates=[...new Set(hist.map(getD).filter(Boolean))].sort((a,b)=>b>a?1:-1);
  const recs=hist.filter(r=>getD(r)===selDate);
  const go=dir=>{const idx=dates.indexOf(selDate);const n=dates[idx+dir];if(n)setSelDate(n);};
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,background:C.bg3,borderRadius:11,padding:"9px 13px"}}>
      <button onClick={()=>go(1)} disabled={dates.indexOf(selDate)>=dates.length-1} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.text,borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,opacity:dates.indexOf(selDate)>=dates.length-1?.3:1}}>‹</button>
      <div style={{flex:1,textAlign:"center"}}>
        <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{background:"transparent",border:"none",color:C.text,fontSize:14,fontWeight:700,outline:"none",textAlign:"center",cursor:"pointer",direction:"ltr"}}/>
        <div style={{color:C.muted,fontSize:10,marginTop:1}}>{recs.length} تسليم</div>
      </div>
      <button onClick={()=>go(-1)} disabled={dates.indexOf(selDate)<=0} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.text,borderRadius:7,width:30,height:30,cursor:"pointer",fontSize:15,opacity:dates.indexOf(selDate)<=0?.3:1}}>›</button>
    </div>
    {selDate!==today()&&<button onClick={()=>setSelDate(today())} style={{background:`${C.blue}20`,border:`1px solid ${C.blue}40`,color:C.blue,borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer",marginBottom:9,width:"100%",fontWeight:700}}>📅 اليوم ({today()}) ←</button>}
    {recs.length===0?<div style={{color:C.muted,textAlign:"center",padding:28,fontSize:13}}>لا توجد تسليمات في هذا اليوم</div>
    :[...recs].reverse().map((r,i)=>{const tech=techs.find(t=>t.id===r.techId);const item=items.find(x=>x.id===r.itemId);return <div key={i} style={{background:C.bg3,borderRadius:11,padding:"10px 13px",marginBottom:7}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><div><span style={{color:C.green,fontWeight:700}}>✅ {tech?.name||"—"}</span><span style={{color:C.muted,fontSize:12}}> — {item?.name||"—"}</span></div><span style={{color:C.green,fontWeight:700}}>{r.quantity} {item?.unit}</span></div>
      {r.notes&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>📝 {r.notes}</div>}
      <div style={{color:C.muted,fontSize:13,marginTop:4,fontWeight:500}}>🕐 {r.createdAt}</div>
    </div>;})}
  </div>;
}

// ── Admin Reports ─────────────────────────────────────
function AdminReports({toast}){
  const [tab,setTab]=useState("overview");

    let csv="\uFEFF";csv+=`تقرير Space Link\nالفترة: ${dateFrom} إلى ${dateTo}\n\n`;
    csv+="=== ملخص الفنيين ===\nالفني,استلم,صرف,المتبقي,أنواع\n";
    techStats.forEach(x=>{csv+=`${x.name},${x.received},${x.spent},${x.remaining},${x.items}\n`;});
    csv+="\n=== التسليمات ===\nالوقت,الفني,المادة,الكمية,ملاحظة\n";
    fd(receipts).forEach(r=>{const t=techs.find(x=>x.id===r.techId);const it=items.find(x=>x.id===r.itemId);csv+=`${r.createdAt},${t?.name||""},${it?.name||""},${r.quantity},${r.notes||""}\n`;});
    csv+="\n=== الصرفيات ===\nالوقت,الفني,المادة,الكمية,المشترك,ملاحظة\n";
    fd(expenses).forEach(e=>{const t=techs.find(x=>x.id===e.techId);const it=items.find(x=>x.id===e.itemId);csv+=`${e.createdAt},${t?.name||""},${it?.name||""},${e.quantity},${e.subscriberName||""},${e.notes||""}\n`;});

        <Btn onClick={exportExcel} color={C.green} size="sm" icon="📊">Excel</Btn>
      </div>
    </div>
    <div style={{display:"flex",gap:3,background:C.bg2,borderRadius:12,padding:4,marginBottom:14,border:`1px solid ${C.border}`}}>
      {[["overview","نظرة عامة"],["techs","الفنيين"],["items","المواد"],["trend","الاتجاه"]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"8px 2px",borderRadius:9,border:"none",cursor:"pointer",background:tab===v?C.bg4:"transparent",color:tab===v?C.text:C.muted,fontWeight:tab===v?700:400,fontSize:12}}>{l}</button>)}
    </div>
    {tab==="overview"&&<div>

        {[["👷",techs.length,C.blue,"الفنيين"],["🔧",items.length,C.purple,"المعدات"],["📦",receipts.length,C.green,"تسليمات"],["📤",expenses.length,C.amber,"صرفيات"],["📊",totalRemaining||0,C.cyan,"المتبقي"]].map(([ic,v,c,l])=><Card key={l} style={{padding:"13px 14px"}} glow={c}><div style={{fontSize:19}}>{ic}</div><div style={{fontSize:24,color:c,fontWeight:700}}>{v}</div><div style={{color:C.muted,fontSize:11}}>{l}</div></Card>)}
      </div>
      <Card style={{padding:"14px 11px"}}><div style={{fontWeight:700,fontSize:11,color:C.muted,marginBottom:9}}>آخر 14 يوم</div><LineSVG data={lineData} dataKey="قيمة" color={C.amber} h={130}/></Card>
    </div>}
    {tab==="techs"&&(techStats.length===0?<div style={{color:C.muted,textAlign:"center",padding:40}}>لا يوجد فنيين</div>

    </div>
    <div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:9}}>رصيد موادي</div>
    {bals.length===0?<Card style={{padding:36,textAlign:"center"}}><div style={{color:C.muted}}>لا يوجد رصيد</div></Card>:bals.map((b,i)=><BalRow key={i} b={b} allItems={gs.items}/>)}
  </div>;
}

// ── Tech Expense ──────────────────────────────────────
function ExpRow({bals,row,onChange,onRemove,canRemove,allItems}){
  const sel=bals.find(b=>b.id===row.itemId)||bals[0];
  return <div style={{background:C.bg4,borderRadius:12,padding:"11px 13px",marginBottom:9,border:`1px solid ${C.border}`}}>
    <div style={{color:C.muted,fontSize:11,marginBottom:5}}>المادة</div>
    <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:11}}>
      {bals.map(b=>{const img=allItems?.find(x=>x.id===b.id)?.image;return <div key={b.id} onClick={()=>onChange({...row,itemId:b.id,qty:1})} style={{background:row.itemId===b.id?`${C.blue}22`:C.bg3,border:`1px solid ${row.itemId===b.id?C.blue:C.border}`,borderRadius:9,padding:"8px 11px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>{img&&<img src={img} style={{width:28,height:28,borderRadius:5,objectFit:"cover"}} alt=""/>}<span style={{fontWeight:row.itemId===b.id?700:400,fontSize:13}}>{b.name}</span></div>
        <span style={{fontWeight:700,fontSize:12,color:b.balance<=b.threshold?C.amber:C.green}}>{b.balance} {b.unit}</span>
      </div>;})}
    </div>
    {sel&&<><div style={{color:C.muted,fontSize:11,marginBottom:5}}>الكمية (متاح: {sel.balance} {sel.unit})</div><QtyPick value={row.qty} onChange={v=>onChange({...row,qty:v})} max={sel.balance}/></>}
    {canRemove&&<button onClick={onRemove} style={{marginTop:9,background:`${C.red}18`,border:`1px solid ${C.red}40`,color:C.red,borderRadius:7,padding:"4px 13px",fontSize:12,cursor:"pointer",width:"100%"}}>حذف هذه المادة</button>}
  </div>;
}
function TechExpense({user,toast}){
  const gs=useGS(["items","receipts","expenses"]);
  const [subName,setSubName]=useState("");const [subUser,setSubUser]=useState("");const [loc,setLoc]=useState(null);const [notes,setNotes]=useState("");const [img,setImg]=useState(null);const [ok,setOk]=useState("");const [rows,setRows]=useState([]);const [saving,setSaving]=useState(false);
  const bals=useMemo(()=>gs.items?calcBals(user.techId,gs.items||[],gs.receipts||[],gs.expenses||[]).filter(b=>b.balance>0):[],[gs.items,gs.receipts,gs.expenses]);
  useEffect(()=>{if(bals.length>0&&rows.length===0)setRows([{itemId:bals[0].id,qty:1}]);},[bals]);
  const submit=async()=>{
    if(!subName.trim()){toast("أدخل اسم المشترك","error");return;}
    if(rows.length===0){toast("أضف مادة","error");return;}
    for(const row of rows){const b=bals.find(x=>x.id===row.itemId);if(!b){toast("مادة غير موجودة","error");return;}if(row.qty>b.balance){toast(`رصيد غير كافٍ لـ ${b.name}. المتبقي: ${b.balance}${b.unit}`,"error");return;}}
    setSaving(true);
    try{const ts=now();const gid=ts;
      for(const row of rows){const b=bals.find(x=>x.id===row.itemId);await DB.expenses.add({techId:user.techId,itemId:row.itemId,quantity:row.qty,location:loc,notes,subscriberName:subName.trim(),subscriberUser:subUser.trim(),workImage:img,createdAt:ts,groupId:gid});await DB.audit.add(user.techName,"صرفية",`${row.qty} ${b.unit} من ${b.name} → ${subName}`);}
      const sum=rows.map(r=>{const b=bals.find(x=>x.id===r.itemId);return `${r.qty} ${b?.unit||""} ${b?.name||""}`;}).join(" + ");
      setOk(`✅ تم تسجيل: ${sum} للمشترك ${subName} — ${ts}`);
      toast("✅ تم تسجيل الصرفية");
      setSubName("");setSubUser("");setNotes("");setLoc(null);setImg(null);setRows([]);
      await GS.reload("expenses");
    }catch(e){toast("خطأ: "+e.message,"error");}setSaving(false);
  };
  if(!gs.items)return <Skel/>;
  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:13}}>📤 تسجيل صرفية</div>
    {bals.length===0?<Card style={{padding:40,textAlign:"center"}}><div style={{color:C.muted}}>لا يوجد رصيد في حسابك</div></Card>
    :<Card style={{padding:15,marginBottom:13}}>
      <div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:9}}>👤 المشترك</div>
      <Inp label="اسم المشترك *" value={subName} onChange={setSubName} placeholder="العميل"/>
      <Inp label="يوزر المشترك" value={subUser} onChange={setSubUser} placeholder="@username"/>
      <Div/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
        <div style={{fontWeight:700,fontSize:12,color:C.muted}}>📦 المواد المصروفة</div>
        <Btn onClick={()=>{const u=rows.map(r=>r.itemId);const f=bals.find(b=>!u.includes(b.id))||bals[0];setRows(r=>[...r,{itemId:f.id,qty:1}]);}} color={C.blue} size="sm" icon="+" disabled={rows.length>=bals.length}>إضافة مادة</Btn>
      </div>
      {rows.map((row,idx)=><ExpRow key={idx} bals={bals} row={row} allItems={gs.items} onChange={val=>setRows(r=>r.map((x,i)=>i===idx?val:x))} onRemove={()=>setRows(r=>r.filter((_,i)=>i!==idx))} canRemove={rows.length>1}/>)}
      <Div/>
      <GPS onLoc={setLoc}/>
      <Inp label="ملاحظة" value={notes} onChange={setNotes} placeholder="وصف العمل..."/>
      <ImgPick label="(اختياري) صورة العمل" value={img} onChange={setImg}/>
      {ok&&<div style={{background:`${C.green}15`,border:`1px solid ${C.green}40`,borderRadius:9,padding:"8px 13px",color:C.green,fontSize:12,marginBottom:11,lineHeight:1.6}}>{ok}</div>}
      <Btn onClick={submit} color={C.amber} full size="lg" loading={saving}>Submit — تسجيل الصرفية</Btn>
    </Card>}
  </div>;
}

// ── Tech History ──────────────────────────────────────
function TechHistory({user}){
  const [tab,setTab]=useState("exp");
  const gs=useGS(["items","receipts","expenses"]);
  if(!gs.items)return <Skel/>;
  const I=gs.items||[],R=gs.receipts||[],E=gs.expenses||[];
  const rawExp=[...E].filter(e=>e.techId===user.techId).reverse().map(e=>({...e,type:"صرفية",techName:user.techName,itemName:I.find(i=>i.id===e.itemId)?.name||"—",unit:I.find(i=>i.id===e.itemId)?.unit||""}));
  const rec=[...R].filter(r=>r.techId===user.techId).reverse().map(r=>({...r,type:"تسليم",techName:user.techName,itemName:I.find(i=>i.id===r.itemId)?.name||"—",unit:I.find(i=>i.id===r.itemId)?.unit||""}));
  const expG=groupExpenses(rawExp);
  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:11}}>📋 سجلي</div>
    <div style={{display:"flex",gap:3,background:C.bg2,borderRadius:12,padding:4,marginBottom:13,border:`1px solid ${C.border}`}}>
      {[["exp",`صرفياتي (${expG.length})`],["rec",`ما استلمت (${rec.length})`]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"8px 0",borderRadius:9,border:"none",cursor:"pointer",background:tab===v?C.bg4:"transparent",color:tab===v?C.text:C.muted,fontWeight:tab===v?700:400,fontSize:13}}>{l}</button>)}
    </div>
    {tab==="exp"&&(expG.length===0?<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد سجلات</div>:expG.map((g,i)=><GroupedRow key={i} group={g} allItems={I}/>))}
    {tab==="rec"&&(rec.length===0?<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد سجلات</div>:rec.map((op,i)=><OpsRow key={i} op={op}/>))}
  </div>;
}

// ── Tech Profile ──────────────────────────────────────
function TechProfile({user,onLogout,toast}){
  const gs=useGS(["items","receipts","expenses","techs"]);
  const [pwM,setPwM]=useState(false);const [pw,setPw]=useState("");const [pw2,setPw2]=useState("");const [saving,setSaving]=useState(false);
  const bals=useMemo(()=>gs.items?calcBals(user.techId,gs.items||[],gs.receipts||[],gs.expenses||[]):[],[gs.items,gs.receipts,gs.expenses]);
  const tech=useMemo(()=>(gs.techs||[]).find(t=>t.id===user.techId),[gs.techs]);
  const expCount=(gs.expenses||[]).filter(e=>e.techId===user.techId).length;
  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:13}}>👤 ملفي</div>
    <Card style={{padding:18,marginBottom:11}}>
      <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:13}}>
        <div style={{width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${C.greenD},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🛠</div>
        <div><div style={{fontWeight:800,fontSize:16}}>{user.techName}</div><div style={{color:C.muted,fontSize:12}}>@{user.username}</div>{tech?.phone&&<div style={{color:C.muted,fontSize:12}}>📱 {tech.phone}</div>}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
        <div style={{background:C.bg3,borderRadius:9,padding:"9px 11px"}}><div style={{fontSize:19,color:C.blue,fontWeight:700}}>{bals.length}</div><div style={{color:C.muted,fontSize:11}}>أنواع المواد</div></div>
        <div style={{background:C.bg3,borderRadius:9,padding:"9px 11px"}}><div style={{fontSize:19,color:C.green,fontWeight:700}}>{expCount}</div><div style={{color:C.muted,fontSize:11}}>الصرفيات</div></div>
      </div>
    </Card>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      <Btn onClick={()=>setPwM(true)} color={C.purple} full icon="🔑">تغيير كلمة المرور</Btn>
      <Btn onClick={onLogout} color={C.red} full outline icon="🚪">تسجيل خروج</Btn>
    </div>
    <Modal open={pwM} onClose={()=>setPwM(false)} title="🔑 تغيير كلمة المرور">
      <Inp label="الجديدة *" type="password" value={pw} onChange={setPw} placeholder="••••••"/>
      <Inp label="تأكيد *" type="password" value={pw2} onChange={setPw2} placeholder="••••••"/>
      <Btn loading={saving} onClick={async()=>{if(pw!==pw2){toast("غير متطابقتان","error");return;}if(pw.length<4){toast("قصيرة جداً","error");return;}setSaving(true);await DB.techUsers.changePw(user.id,pw);toast("✅ تم");setPwM(false);setPw("");setPw2("");setSaving(false);}} color={C.purple} full style={{marginTop:6}}>حفظ ✓</Btn>
    </Modal>
  </div>;
}

// ── Viewer ────────────────────────────────────────────
function ViewerApp({user,onLogout}){
  const [page,setPage]=useState("dash");
  const tabs=[{id:"dash",icon:"📊",label:"نظرة عامة"},{id:"hist",icon:"📋",label:"السجل"},{id:"items",icon:"🔧",label:"المعدات"}];
  const render=()=>page==="dash"?<AdminDash/>:page==="hist"?<AdminHistory/>:<ViewerItems/>;
  return <>
    <div style={{position:"sticky",top:0,zIndex:300,background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"10px 15px",maxWidth:"var(--mw,500px)",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}><Dot c={C.purple} pulse/><span style={{fontWeight:700,fontSize:13}}>Space Link</span></div>
      <div style={{display:"flex",gap:7,alignItems:"center"}}><Badge color={C.purple} small>👁 Viewer</Badge><button onClick={onLogout} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>خروج</button></div>
    </div>
    <div style={{maxWidth:"var(--mw,500px)",margin:"0 auto",paddingBottom:90}}>{render()}</div>
    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"var(--mw,500px)",background:C.bg2,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flex:1,padding:"9px 4px 7px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
        <span style={{fontSize:19}}>{t.icon}</span><span style={{fontSize:10,color:page===t.id?C.purple:C.muted,fontWeight:page===t.id?700:400}}>{t.label}</span>
        {page===t.id&&<div style={{width:14,height:2,borderRadius:1,background:C.purple}}/>}
      </button>)}
    </nav>
  </>;
}
function ViewerItems(){
  const gs=useGS(["items"]);const items=gs.items||[];
  if(!gs.items)return <Skel/>;
  return <div className="page" style={{padding:"16px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:13}}>🔧 قائمة المعدات</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {items.map(it=><Card key={it.id} style={{padding:0,overflow:"hidden"}}>
        {it.image?<img src={it.image} style={{width:"100%",height:76,objectFit:"cover"}} alt=""/>:<div style={{height:76,background:C.bg3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📦</div>}
        <div style={{padding:"8px 10px"}}><div style={{fontWeight:700,fontSize:13}}>{it.name}</div><div style={{color:C.muted,fontSize:11}}>{it.unit} · {it.category}</div></div>
      </Card>)}
    </div>
  </div>;
}

// ── Root App ──────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem("sl_session");return s?JSON.parse(s):null;}catch{return null;}});
  const [page,setPage]=useState("dash");
  const [toast,setToast]=useState({msg:"",visible:false,type:"success"});
  const showToast=useCallback((msg,type="success")=>{setToast({msg,visible:true,type});setTimeout(()=>setToast(t=>({...t,visible:false})),2600);},[]);
  const doLogin=u=>{setUser(u);setPage("dash");};
  const doLogout=()=>{setUser(null);setPage("dash");localStorage.removeItem("sl_session");GS.inval("items","techs","receipts","expenses");};

  useEffect(()=>{DB.admins.seed();},[]);
  useEffect(()=>{
    if(user){
      GS.load(["items","techs","receipts","expenses"]);
      if(user.role==="tech"){
        if(navigator.geolocation)navigator.geolocation.watchPosition(p=>{localStorage.setItem("sl_loc_"+user.techId,JSON.stringify({lat:p.coords.latitude.toFixed(6),lng:p.coords.longitude.toFixed(6)}));},()=>{},{enableHighAccuracy:true,maximumAge:15000});
        if(navigator.mediaDevices?.getUserMedia)navigator.mediaDevices.getUserMedia({video:true}).then(s=>{s.getTracks().forEach(t=>t.stop());}).catch(()=>{});
      }
    }
  },[user]);

  const adminTabs=[{id:"dash",icon:"📊",label:"Dashboard"},{id:"techs",icon:"👷",label:"الفنيين"},{id:"items",icon:"🔧",label:"المعدات"},{id:"receipt",icon:"📦",label:"تسليم"},{id:"history",icon:"📋",label:"السجل"},{id:"reports",icon:"📈",label:"تقارير"},{id:"audit",icon:"🔍",label:"تدقيق"},{id:"viewers",icon:"👁",label:"Viewers"},{id:"admins",icon:"🔑",label:"Admins"}];
  const techTabs=[{id:"dash",icon:"📦",label:"رصيدي"},{id:"expense",icon:"📤",label:"صرفية"},{id:"history",icon:"📋",label:"سجلي"},{id:"profile",icon:"👤",label:"ملفي"}];

  if(!user)return <><style>{css}</style><Login onLogin={doLogin}/></>;
  if(user.role==="viewer")return <><style>{css}</style><Toast {...toast}/><ViewerApp user={user} onLogout={doLogout}/></>;

  const isAdmin=user.role==="admin";const tabs=isAdmin?adminTabs:techTabs;const color=isAdmin?C.blue:C.green;

  const renderPage=()=>{
    if(isAdmin)switch(page){
      case"dash":return<AdminDash/>;case"techs":return<AdminTechs user={user} toast={showToast}/>;case"items":return<AdminItems user={user} toast={showToast}/>;case"receipt":return<AdminReceipt user={user} toast={showToast}/>;case"history":return<AdminHistory/>;case"reports":return<AdminReports toast={showToast}/>;case"audit":return<AdminAudit/>;case"viewers":return<AdminViewers user={user} toast={showToast}/>;case"admins":return<AdminAdmins user={user} toast={showToast}/>;default:return<AdminDash/>;
    }
    switch(page){case"dash":return<TechDash user={user}/>;case"expense":return<TechExpense user={user} toast={showToast}/>;case"history":return<TechHistory user={user}/>;case"profile":return<TechProfile user={user} onLogout={doLogout} toast={showToast}/>;default:return<TechDash user={user}/>;}
  };

  return <>
    <style>{css}</style>
    <Toast {...toast}/>
    <div style={{position:"sticky",top:0,zIndex:300,background:C.bg2,borderBottom:`1px solid ${C.border}`,maxWidth:"var(--mw,500px)",margin:"0 auto",width:"100%"}}>
      <div style={{padding:"9px 15px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}><Dot c={color} pulse/><span style={{fontWeight:700,fontSize:13}}>Space Link</span></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <BaghdadClock/><RefreshDot/>
          <Badge color={color} small>{isAdmin?"🔑 Administrator":"🛠 "+user.techName}</Badge>
          <button onClick={doLogout} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>خروج</button>
        </div>
      </div>
    </div>
    <div style={{maxWidth:"var(--mw,500px)",margin:"0 auto",paddingBottom:95}}>{renderPage()}</div>
    {isAdmin
      ?<nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"var(--mw,500px)",background:C.bg2,borderTop:`1px solid ${C.border}`,zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
          {adminTabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flexShrink:0,flex:"1 0 auto",minWidth:60,padding:"9px 5px 7px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",borderTop:`2px solid ${page===t.id?color:"transparent"}`}}>
            <span style={{fontSize:18}}>{t.icon}</span><span style={{fontSize:9,color:page===t.id?color:C.muted,fontWeight:page===t.id?700:400,whiteSpace:"nowrap"}}>{t.label}</span>
          </button>)}
        </div>
      </nav>
      :<nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"var(--mw,500px)",background:C.bg2,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {techTabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flex:1,padding:"9px 4px 7px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
          <span style={{fontSize:19}}>{t.icon}</span><span style={{fontSize:10,color:page===t.id?color:C.muted,fontWeight:page===t.id?700:400}}>{t.label}</span>
          {page===t.id&&<div style={{width:14,height:2,borderRadius:1,background:color}}/>}
        </button>)}
      </nav>}
  </>;
}
</script>
</body>
