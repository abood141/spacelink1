<script>
// Load scripts sequentially for reliability
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed: ' + src));
    document.head.appendChild(s);
  });
}

async function boot() {
  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js');

    // Now compile and run the app
    const appCode = document.getElementById('app-source').textContent;
    const compiled = Babel.transform(appCode, { presets: ['react'] }).code;
    const fn = new Function(
      'React','ReactDOM',
      compiled + '\nreturn App;'
    );
    const App = fn(React, ReactDOM);
    document.getElementById('loading').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  } catch(e) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#F75D5D;text-align:center;padding:24px">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-weight:700;margin-bottom:8px">خطأ في التحميل</div>
        <div style="font-size:12px;color:#5A6A85">تأكد من اتصال الإنترنت وأعد تحميل الصفحة</div>
        <button onclick="location.reload()" style="margin-top:16px;background:#4F8EF7;border:none;color:#fff;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px">🔄 إعادة تحميل</button>
        <div style="font-size:10px;color:#5A6A85;margin-top:8px">${e.message}</div>
      </div>`;
  }
}
boot();
</script>

// ── Simple SVG Charts (no external library) ──
function BarChartSVG({data,dataKeys,colors,height=160}){
  if(!data||data.length===0) return null;
  const vals=data.flatMap(d=>dataKeys.map(k=>d[k]||0));
  const maxV=Math.max(...vals,1);
  const w=320,h=height,pad=30,barGap=4;
  const slotW=(w-pad)/(data.length);
  const bw=Math.max(4,(slotW/dataKeys.length)-barGap);
  return <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
    {data.map((d,i)=>dataKeys.map((k,ki)=>{
      const val=d[k]||0;const bh=Math.max(2,(val/maxV)*(h-pad-10));
      const x=pad+i*slotW+ki*(bw+barGap);const y=h-pad-bh;
      return <g key={k+i}><rect x={x} y={y} width={bw} height={bh} fill={colors[ki]} rx={2}/>
      </g>;
    }))}
    {data.map((d,i)=><text key={i} x={pad+i*slotW+slotW/2} y={h-8} textAnchor="middle" fontSize={9} fill="#5A6A85">{d.day||d.name||""}</text>)}
  </svg>;
}
function LineChartSVG({data,dataKey,color,height=140}){
  if(!data||data.length===0) return null;
  const vals=data.map(d=>d[dataKey]||0);
  const maxV=Math.max(...vals,1);
  const w=320,h=height,pad=20;
  const pts=data.map((d,i)=>{const x=pad+i*((w-2*pad)/(data.length-1||1));const y=pad+(1-(d[dataKey]||0)/maxV)*(h-2*pad);return `${x},${y}`;});
  return <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
    <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round"/>
    {data.map((d,i)=>{const x=pad+i*((w-2*pad)/(data.length-1||1));return <text key={i} x={x} y={h-2} textAnchor="middle" fontSize={9} fill="#5A6A85">{d.day||""}</text>;})}
  </svg>;
}
function PieChartSVG({data,size=130}){
  if(!data||data.length===0) return null;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let angle=-Math.PI/2;const r=45,cx=size/2,cy=size/2;
  return <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size}}>
    {data.map((d,i)=>{
      const slice=(d.value/total)*Math.PI*2;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
      const lg=slice>Math.PI?1:0;
      const path=`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} Z`;
      angle+=slice;
      return <path key={i} d={path} fill={d.fill}/>;
    })}
    <circle cx={cx} cy={cy} r={25} fill="#0D1220"/>
  </svg>;
}

const GPSButton=({onLocation})=>{
  const [loading,setLoading]=useState(false);
  const [loc,setLoc]=useState(null);
  const get=()=>{
    if(!navigator.geolocation){alert("المتصفح لا يدعم GPS");return;}
    setLoading(true);
    navigator.geolocation.getCurrentPosition(pos=>{const l={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6),accuracy:Math.round(pos.coords.accuracy)};setLoc(l);onLocation(l);setLoading(false);},err=>{setLoading(false);alert("خطأ: "+err.message);},{enableHighAccuracy:true,timeout:10000});
  };
  return <div style={{marginBottom:13}}>
    <div style={{color:C.muted,fontSize:11,marginBottom:6}}>موقع GPS</div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <Btn onClick={get} disabled={loading} color={C.cyan} size="sm" icon="📍">{loading?"جارٍ...":"تحديد الموقع"}</Btn>
      {loc&&<a href={`https://maps.google.com/?q=${loc.lat},${loc.lng}`} target="_blank" rel="noreferrer" style={{color:C.cyan,fontSize:12,textDecoration:"none"}}>🗺 عرض</a>}
    </div>

};

function groupExpenses(expenses){
  const map={};
  expenses.forEach(e=>{const key=e.groupId||(e.createdAt+"_"+(e.subscriberName||""));if(!map[key])map[key]=[];map[key].push(e);});
  return Object.values(map).sort((a,b)=>b[0].createdAt>a[0].createdAt?1:-1);
}

function AdminAdmins({user,toast}){
  const [admins,setAdmins]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({username:"",password:"",displayName:""});
  const [saving,setSaving]=useState(false);
  const rf=async()=>setAdmins(await DB.admin.all());
  useEffect(()=>{rf();},[]);
  const add=async()=>{
    if(!form.username.trim()||!form.password.trim()){toast("أكمل الحقول","error");return;}
    if(form.password.length<4){toast("كلمة المرور قصيرة جداً","error");return;}
    if(await DB.admin.exists(form.username.trim())){toast("اسم المستخدم موجود","error");return;}
    setSaving(true);
    try{
      await DB.admin.add(form.username.trim(),form.password.trim(),form.displayName.trim()||form.username.trim());
      await DB.audit.add(user.displayName,"إضافة أدمن",form.username.trim());
      await rf();setModal(null);setForm({username:"",password:"",displayName:""});
      toast("✅ تم إنشاء حساب الأدمن");
    }catch(e){toast("خطأ: "+e.message,"error");}
    setSaving(false);
  };
  if(!admins)return <LoadingPage/>;
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontWeight:800,fontSize:18}}>🔑 الأدمنز</div>
      <Btn onClick={()=>setModal("add")} color={C.blue} size="sm" icon="+">إضافة أدمن</Btn>
    </div>
    <div style={{background:`${C.blue}15`,border:`1px solid ${C.blue}40`,borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.blue}}>
      كل الأدمنز يملكون نفس الصلاحيات الكاملة
    </div>
    {admins.map(a=><Card key={a.id} style={{padding:"12px 16px",marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>{a.displayName}</div>
          <div style={{color:C.muted,fontSize:12}}>@{a.username}</div>
          <div style={{color:C.muted,fontSize:11}}>{a.createdAt}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <Badge color={C.blue} small>🔑 Admin</Badge>
          {a.id!==1&&<Btn size="sm" color={C.purple} onClick={()=>setModal({type:"pw",admin:a})}>🔑</Btn>}
          {a.id!==1&&<Btn size="sm" color={C.red} onClick={async()=>{
            if(confirm(`حذف ${a.username}؟`)){
              await DB.admin.delete(a.id);
              await DB.audit.add(user.displayName,"حذف أدمن",a.username);
              toast("🗑 تم الحذف");rf();
            }
          }}>🗑</Btn>}
          {a.id===1&&<Badge color={C.green} small>⭐ رئيسي</Badge>}
        </div>
      </div>
    </Card>)}
    <Modal open={modal==="add"} onClose={()=>setModal(null)} title="➕ إضافة أدمن جديد">
      <div style={{background:`${C.blue}12`,border:`1px solid ${C.blue}30`,borderRadius:10,padding:"9px 14px",marginBottom:14,fontSize:12,color:C.blue}}>
        ⚠️ الأدمن الجديد يملك نفس صلاحياتك الكاملة
      </div>
      <Input label="الاسم (اختياري)" value={form.displayName} onChange={v=>setForm({...form,displayName:v})} placeholder="الاسم الكامل"/>
      <Input label="اسم المستخدم *" value={form.username} onChange={v=>setForm({...form,username:v})} placeholder="admin2"/>
      <Input label="كلمة المرور *" type="password" value={form.password} onChange={v=>setForm({...form,password:v})} placeholder="••••••"/>
      <Btn onClick={add} color={C.blue} full loading={saving} style={{marginTop:8}}>إنشاء الحساب ✓</Btn>
    </Modal>
    <Modal open={modal?.type==="pw"} onClose={()=>setModal(null)} title={`🔑 تغيير كلمة مرور — ${modal?.admin?.username}`}>
      {modal?.admin&&<ResetAdminPw admin={modal.admin} onDone={async()=>{await DB.audit.add(user.displayName,"تغيير كلمة مرور أدمن",modal.admin.username);setModal(null);toast("✅ تم التغيير");}}/>}
    </Modal>
  </div>;
}
function ResetAdminPw({admin,onDone}){
  const [pw,setPw]=useState("");const [saving,setSaving]=useState(false);
  return <><div style={{color:C.muted,fontSize:12,marginBottom:12}}>المستخدم: <strong style={{color:C.text}}>{admin.username}</strong></div>
    <Input label="كلمة المرور الجديدة *" type="password" value={pw} onChange={setPw} placeholder="••••••"/>
    <Btn loading={saving} onClick={async()=>{if(pw.length<4){alert("قصيرة جداً");return;}setSaving(true);await DB.admin.changePw(admin.id,pw);onDone();}} color={C.purple} full style={{marginTop:8}}>حفظ ✓</Btn></>;
}

//  LOGIN
// ═══════════════════════════════════════════
function LoginScreen({onLogin}){
  const [role,setRole]=useState("admin");
  const [u,setU]=useState("");const [p,setP]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const [stay,setStay]=useState(true);
  const login=async()=>{
    if(!u.trim()||!p.trim()){setErr("أدخل اسم المستخدم وكلمة المرور");return;}
    setLoading(true);setErr("");
    try{
      if(role==="admin"){
        // fallback مباشر للأدمن بدون Supabase
        if(u.trim()==="sattar141" && hashPw(p.trim())===hashPw("Ak141@")){
          onLogin({id:1,username:"sattar141",role:"admin",displayName:"Administrator",_stay:stay});
          return;
        }
        const a=await Promise.race([DB.admin.login(u.trim(),p.trim()),new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),3000))]);
        if(!a){setErr("❌ بيانات الإداري غير صحيحة");setLoading(false);return;}
        onLogin({...a,role:"admin",displayName:a.displayName||"Administrator",_stay:stay});
      }
      else if(role==="viewer"){
        const v=await Promise.race([DB.viewers.login(u.trim(),p.trim()),new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),3000))]);
        if(!v){setErr("❌ بيانات الدخول غير صحيحة");setLoading(false);return;}
        onLogin({...v,role:"viewer",_stay:stay});
      }
      else{
        const tu=await Promise.race([DB.techUsers.login(u.trim(),p.trim()),new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),3000))]);
        if(!tu){setErr("❌ اسم المستخدم أو كلمة المرور غير صحيحة");setLoading(false);return;}
        const tech=await DB.techs.find(tu.techId);
        onLogin({...tu,role:"tech",techName:tech?.name||u.trim(),_stay:stay});
      }
    }catch(e){
      // لو فشل Supabase، جرب fallback للأدمن
      if(role==="admin" && u.trim()==="sattar141" && hashPw(p.trim())===hashPw("Ak141@")){
        onLogin({id:1,username:"sattar141",role:"admin",displayName:"Administrator",_stay:stay});
        return;
      }
      setErr("خطأ في الاتصال بقاعدة البيانات — تأكد من الإنترنت");
    }
    setLoading(false);
  };
  const roles=[["admin","🔑","Admin",C.blue],["tech","🛠","Technician",C.green],["viewer","👁","Viewer",C.purple]];
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{width:70,height:70,borderRadius:"50%",background:`linear-gradient(135deg,${C.blueD},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 14px",boxShadow:`0 0 30px ${C.blue}40`}}>🌐</div>
        <div style={{fontWeight:800,fontSize:24,letterSpacing:-.5}}>Space Link</div>
        <div style={{color:C.muted,fontSize:13,marginTop:4}}>نظام إدارة مكتب الإنترنت</div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:20,background:C.bg2,borderRadius:14,padding:4,border:`1px solid ${C.border}`}}>
        {roles.map(([v,ic,l,c])=><button key={v} onClick={()=>{setRole(v);setErr("");setU("");setP("");}} style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",cursor:"pointer",background:role===v?`${c}20`:"transparent",color:role===v?c:C.muted,fontWeight:role===v?700:400,fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:18}}>{ic}</span><span>{l}</span></button>)}
      </div>
      <Card style={{padding:24}}>
        <Input label="اسم المستخدم" value={u} onChange={v=>{setU(v);setErr("");}} placeholder={role==="admin"?"sattar141":"username"}/>
        <Input label="كلمة المرور" type="password" value={p} onChange={v=>{setP(v);setErr("");}} placeholder="••••••"/>
        {err&&<div style={{color:C.red,fontSize:12,marginBottom:10,padding:"8px 12px",background:`${C.red}15`,borderRadius:8}}>{err}</div>}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer"}} onClick={()=>setStay(!stay)}>
          <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${stay?C.blue:C.border}`,background:stay?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
            {stay&&<span style={{color:"#fff",fontSize:14,lineHeight:1}}>✓</span>}
          </div>
          <span style={{fontSize:13,color:stay?C.text:C.muted,userSelect:"none"}}>ابقَ متصلاً (Stay signed in)</span>
        </div>
        <Btn onClick={login} color={roles.find(r=>r[0]===role)?.[3]||C.blue} full size="lg" loading={loading}>دخول ←</Btn>
      </Card>
      <div style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:14}}>{role!=="admin"?"الحساب يُنشئه الإداري فقط":""}</div>
    </div>
  </div>;
}

function AdminDash(){
  const [data,setData]=useState(null);
  useEffect(()=>{(async()=>{
    const [techs,items,receipts,expenses]=await Promise.all([DB.techs.all(),DB.items.all(),DB.receipts.all(),DB.expenses.all()]);
    const allBals=[];for(const t of techs){const b=await DB.fullBalances(t.id);allBals.push(...b);}
    const lowMap=new Map();allBals.filter(b=>b.balance>=0&&b.balance<=b.threshold).forEach(x=>lowMap.set(x.id,x));
    const low=[...lowMap.values()];
    const usageMap={};expenses.forEach(e=>{const it=items.find(i=>i.id===e.itemId);if(!it)return;usageMap[e.itemId]=usageMap[e.itemId]||{name:it.name,unit:it.unit,total:0};usageMap[e.itemId].total+=e.quantity;});
    const topItems=Object.values(usageMap).sort((a,b)=>b.total-a.total).slice(0,6);
    const days7=[...Array(7)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);});
    const dailyData=days7.map(d=>({day:d.slice(5),"تسليم":receipts.filter(r=>r.createdAt.includes(d.replace(/-/g,"/"))||r.createdAt.startsWith(d)).length,"صرفية":expenses.filter(e=>e.createdAt.includes(d.replace(/-/g,"/"))||e.createdAt.startsWith(d)).length}));
    const pieData=topItems.slice(0,5).map((it,i)=>({name:it.name,value:it.total,fill:C.chart[i]}));
    const techSummaries=[];for(const tech of techs){const bals=await DB.fullBalances(tech.id);techSummaries.push({...tech,bal:bals.reduce((s,b)=>s+b.balance,0),lowCount:bals.filter(b=>b.balance>=0&&b.balance<=b.threshold).length,balsLen:bals.length});}
    setData({techs,items,receipts,expenses,low,topItems,dailyData,pieData,totalReceived:receipts.reduce((s,r)=>s+r.quantity,0),totalSpent:expenses.reduce((s,e)=>s+e.quantity,0),techSummaries});
  })();},[]);
  if(!data)return <LoadingPage/>;
  const {techs,items,low,topItems,dailyData,pieData,totalReceived,totalSpent,techSummaries}=data;
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{marginBottom:18}}><div style={{color:C.muted,fontSize:12}}>لوحة التحكم</div><div style={{fontWeight:800,fontSize:22}}>مرحباً، Administrator 👋</div></div>
    {low.length>0&&<div style={{background:`linear-gradient(135deg,${C.amber}18,${C.red}10)`,border:`1px solid ${C.amber}50`,borderRadius:14,padding:"12px 14px",marginBottom:16}}>
      <div style={{color:C.amber,fontWeight:700,fontSize:13,marginBottom:6}}>⚠ {low.length} مواد تحت حد التنبيه</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{low.map((a,i)=><Badge key={i} color={C.amber} small>{a.name}: {a.balance} {a.unit}</Badge>)}</div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      {[["🔧",items.length,C.purple,"المعدات"],["👷",techs.length,C.blue,"الفنيين"],["📦",totalReceived,C.green,"إجمالي مستلم"],["📤",totalSpent,C.amber,"إجمالي مصروف"]].map(([ic,v,c,l])=><Card key={l} style={{padding:"14px 16px"}} glow={c}><div style={{fontSize:22,marginBottom:4}}>{ic}</div><div style={{fontSize:24,fontWeight:700,color:c,lineHeight:1}}>{v}</div><div style={{color:C.muted,fontSize:11,marginTop:3}}>{l}</div></Card>)}
    </div>
    <Card style={{padding:"16px 12px",marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:C.muted}}>📊 آخر 7 أيام</div>
      <BarChartSVG data={dailyData} dataKeys={["تسليم","صرفية"]} colors={[C.green,C.amber]} height={160}/>
    </Card>
    {topItems.length>0&&<Card style={{padding:"16px 12px",marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:C.muted}}>🏆 الأكثر استخداماً</div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <PieChartSVG data={pieData} size={130}/>
        <div style={{flex:1}}>{topItems.slice(0,5).map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:C.chart[i],flexShrink:0}}/><span style={{fontSize:12,color:C.text}}>{it.name}</span></div><span style={{fontSize:12,color:C.chart[i],fontWeight:600}}>{it.total}</span></div>)}</div>
      </div>
    </Card>}
    <Card style={{padding:"16px 14px"}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:C.muted}}>👷 ملخص الفنيين</div>
      {techSummaries.length===0?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:16}}>لا يوجد فنيين</div>
      :techSummaries.map(tech=><div key={tech.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
        <div><div style={{fontWeight:700}}>{tech.name}</div><div style={{color:C.muted,fontSize:11}}>{tech.balsLen} نوع مادة</div></div>
        <div style={{textAlign:"right"}}><div style={{color:tech.bal>0?C.green:C.red,fontWeight:700}}>{tech.bal} وحدة</div>{tech.lowCount>0&&<Badge color={C.amber} small>⚠ {tech.lowCount}</Badge>}</div>
      </div>)}
    </Card>
  </div>;
}

function AdminItems({user,toast}){

    if(!form.name.trim()){toast("أدخل اسم المعدة","error");return;}
    setSaving(true);
    try{
      const it={name:form.name.trim(),unit:form.unit.trim()||"قطعة",category:form.category,threshold:parseInt(form.threshold)||3,image:form.image};
      if(editing){await DB.items.update({...editing,...it});await DB.audit.add(user.displayName||"admin","تعديل معدة",form.name);toast("✅ تم التحديث");}
      else{const ex=await DB.items.all();if(ex.find(i=>i.name===it.name)){toast("المعدة موجودة","error");setSaving(false);return;}await DB.items.add(it);await DB.audit.add(user.displayName||"admin","إضافة معدة",form.name);toast("✅ تمت الإضافة");}
      await rf();setModal(null);setEditing(null);setForm({name:"",unit:"قطعة",category:"شبكة",threshold:"3",image:null});
    }catch(e){toast("خطأ: "+e.message,"error");}
    setSaving(false);
  };
  if(!items)return <LoadingPage/>;
  const filtered=items.filter(it=>it.name.includes(search)||it.category?.includes(search));
  const catColors={"شبكة":C.blue,"أجهزة":C.purple,"كابلات":C.cyan,"ملحقات":C.amber,"أخرى":C.muted};

    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      {filtered.map(it=><Card key={it.id} style={{padding:0,overflow:"hidden"}}>

        <div style={{padding:"10px 12px"}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{it.name}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><Badge color={catColors[it.category]||C.muted} small>{it.category||"—"}</Badge><span style={{color:C.muted,fontSize:11}}>{it.unit}</span></div>
          <div style={{color:C.muted,fontSize:11,marginBottom:8}}>تنبيه: {it.threshold}</div>
          <div style={{display:"flex",gap:5}}>
            <Btn size="sm" color={C.blue} onClick={()=>{setEditing(it);setForm({name:it.name,unit:it.unit,category:it.category||"شبكة",threshold:String(it.threshold),image:it.image||null});setModal("form");}} style={{flex:1,fontSize:11,padding:"5px 8px"}}>✏️</Btn>
            <Btn size="sm" color={C.red} onClick={async()=>{if(confirm(`حذف ${it.name}؟`)){await DB.items.delete(it.id);await DB.audit.add(user.displayName||"admin","حذف معدة",it.name);toast("🗑 تم الحذف");rf();}}} style={{flex:1,fontSize:11,padding:"5px 8px"}}>🗑</Btn>
          </div>
        </div>

      <Input label="اسم المعدة *" value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="اسم المادة"/>

      </div>
      <Sel label="الصنف" value={form.category} onChange={v=>setForm({...form,category:v})} options={cats.map(c=>({value:c,label:c}))}/>
      <ImagePicker label="(اختياري) صورة المعدة" value={form.image} onChange={v=>setForm({...form,image:v})}/>
      <Btn onClick={save} color={C.green} full loading={saving} style={{marginTop:8}}>{editing?"التعديل ✓":"إضافة ✓"}</Btn>
    </Modal>
  </div>;
}

  const [tid,setTid]=useState("");const [iid,setIid]=useState("");const [qty,setQty]=useState(1);const [notes,setNotes]=useState("");const [ok,setOk]=useState("");const [saving,setSaving]=useState(false);const [curBal,setCurBal]=useState(null);

    {[...hist].reverse().map((r,i)=>{const tech=techs.find(t=>t.id===r.techId);const item=items.find(x=>x.id===r.itemId);return <div key={i} style={{background:C.bg3,borderRadius:12,padding:"11px 14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><div><span style={{color:C.green,fontWeight:700}}>✅ {tech?.name||"—"}</span><span style={{color:C.muted,fontSize:12}}> — {item?.name||"—"}</span></div><span style={{color:C.green,fontWeight:700}}>{r.quantity} {item?.unit}</span></div>

      <div style={{color:C.muted,fontSize:10,marginTop:4}}>🕐 {r.createdAt}</div>
    </div>;})}
  </div>;
}

function AdminReports({toast}){
  const [tab,setTab]=useState("overview");const [data,setData]=useState(null);
  useEffect(()=>{(async()=>{
    const [techs,expenses,receipts,items]=await Promise.all([DB.techs.all(),DB.expenses.all(),DB.receipts.all(),DB.items.all()]);
    const techStats=[];let totalRemaining=0;for(const t of techs){const b=await DB.fullBalances(t.id);const rem=b.reduce((s,x)=>s+x.balance,0);totalRemaining+=rem;techStats.push({id:t.id,name:t.name,received:b.reduce((s,x)=>s+x.received,0),spent:b.reduce((s,x)=>s+x.spent,0),remaining:rem,items:b.length,low:b.filter(x=>x.balance>=0&&x.balance<=x.threshold).length});}
    const usageMap={};expenses.forEach(e=>{const it=items.find(i=>i.id===e.itemId);if(!it)return;usageMap[e.itemId]=usageMap[e.itemId]||{name:it.name,unit:it.unit,total:0};usageMap[e.itemId].total+=e.quantity;});
    const topItems=Object.values(usageMap).sort((a,b)=>b.total-a.total);
    const days14=[...Array(14)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().slice(0,10);});
    const lineData=days14.map(d=>({day:d.slice(5),قيمة:expenses.filter(e=>e.createdAt.startsWith(d)||e.createdAt.includes(d.replace(/-/g,"/"))).reduce((s,e)=>s+e.quantity,0)}));
    setData({techs,expenses,receipts,items,techStats,topItems,lineData,totalRemaining});
  })();},[]);
  const exportTxt=()=>{
    if(!data)return;
    let t=`تقرير مخزون مكتب الإنترنت\n${today()}\n${"═".repeat(38)}\n\n`;
    t+=`الفنيين:\n`;data.techStats.forEach(x=>{t+=`${x.name}: استلم ${x.received} | صرف ${x.spent} | ${x.items} نوع\n`;});
    t+=`\nأكثر المواد:\n`;data.topItems.slice(0,10).forEach((x,i)=>{t+=`${i+1}. ${x.name}: ${x.total} ${x.unit}\n`;});
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([t],{type:"text/plain"}));a.download=`report_${today()}.txt`;a.click();
    toast("✅ تم تصدير التقرير");
  };
  if(!data)return <LoadingPage/>;
  const {techs,expenses,receipts,items,techStats,topItems,lineData,totalRemaining}=data;
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontWeight:800,fontSize:18}}>📊 التقارير</div>
      <Btn onClick={exportTxt} color={C.purple} size="sm" icon="💾">تصدير</Btn>
    </div>
    <div style={{display:"flex",gap:4,background:C.bg2,borderRadius:13,padding:4,marginBottom:16,border:`1px solid ${C.border}`}}>
      {[["overview","نظرة عامة"],["techs","الفنيين"],["items","المواد"],["trend","الاتجاه"]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"9px 2px",borderRadius:10,border:"none",cursor:"pointer",background:tab===v?C.bg4:"transparent",color:tab===v?C.text:C.muted,fontWeight:tab===v?700:400,fontSize:12}}>{l}</button>)}
    </div>
    {tab==="overview"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[["👷",techs.length,C.blue,"الفنيين"],["🔧",items.length,C.purple,"المعدات"],["📦",receipts.length,C.green,"إجمالي استلام"],["📤",expenses.length,C.amber,"إجمالي صرف"],["📊",totalRemaining||0,C.cyan,"المتبقي غير مصروف"]].map(([ic,v,c,l])=><Card key={l} style={{padding:"14px 16px"}} glow={c}><div style={{fontSize:20}}>{ic}</div><div style={{fontSize:26,color:c,fontWeight:700}}>{v}</div><div style={{color:C.muted,fontSize:11}}>{l}</div></Card>)}
      </div>
      <Card style={{padding:"16px 12px"}}><div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:10}}>آخر 14 يوم</div>
        <LineChartSVG data={lineData} dataKey="قيمة" color={C.amber} height={140}/>
      </Card>
    </div>}
    {tab==="techs"&&(techStats.length===0?<div style={{color:C.muted,textAlign:"center",padding:50}}>لا يوجد فنيين</div>:techStats.map((t,i)=><Card key={i} style={{padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div style={{fontWeight:700,fontSize:15}}>👷 {t.name}</div>{t.low>0&&<Badge color={C.amber} small>⚠ {t.low}</Badge>}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>{[["استلم",t.received,C.blue],["صرف",t.spent,C.amber],["المتبقي",t.remaining,C.cyan],["أنواع",t.items,C.purple]].map(([l,v,c])=><div key={l} style={{background:C.bg3,borderRadius:10,padding:"9px",textAlign:"center"}}><div style={{fontSize:20,color:c,fontWeight:700}}>{v}</div><div style={{color:C.muted,fontSize:10}}>{l}</div></div>)}</div>
    </Card>))}
    {tab==="items"&&<><Card style={{padding:"16px 12px",marginBottom:14}}><div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:10}}>الأكثر استخداماً</div>
      <BarChartSVG data={topItems.slice(0,6).map((x,i)=>({day:x.name.slice(0,6),total:x.total}))} dataKeys={["total"]} colors={[C.amber]} height={160}/>
    </Card>{topItems.map((it,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,background:C.bg3,borderRadius:12,padding:"11px 14px",marginBottom:7}}><div style={{fontSize:18,fontWeight:700,color:C.chart[i]||C.muted,width:30,textAlign:"center"}}>#{i+1}</div><div style={{flex:1}}><div style={{fontWeight:600}}>{it.name}</div></div><div style={{color:C.amber,fontWeight:700,fontSize:16}}>{it.total} {it.unit}</div></div>)}</>}
    {tab==="trend"&&<Card style={{padding:"16px 12px"}}><div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:12}}>الاستهلاك اليومي</div>
      <LineChartSVG data={lineData} dataKey="قيمة" color={C.blue} height={220}/>
    </Card>}
  </div>;
}

function TechExpense({user,toast}){
  const [bals,setBals]=useState([]);const [allItems,setAllItems]=useState([]);
  const [subName,setSubName]=useState("");const [subUser,setSubUser]=useState("");const [location,setLocation]=useState(null);const [notes,setNotes]=useState("");const [workImg,setWorkImg]=useState(null);const [ok,setOk]=useState("");const [rows,setRows]=useState([]);const [saving,setSaving]=useState(false);
  const load=useCallback(async()=>{const [b,items]=await Promise.all([DB.fullBalances(user.techId),DB.items.all()]);const avail=b.filter(x=>x.balance>0);setBals(avail);setAllItems(items);if(avail.length>0)setRows([{itemId:avail[0].id,qty:1}]);else setRows([]);},[user.techId]);
  useEffect(()=>{load();},[load]);
  const submit=async()=>{
    if(!subName.trim()){toast("أدخل اسم المشترك","error");return;}
    if(rows.length===0){toast("أضف مادة واحدة على الأقل","error");return;}
    for(const row of rows){const bal=bals.find(b=>b.id===row.itemId);if(!bal){toast("مادة غير موجودة","error");return;}if(row.qty>bal.balance){toast(`رصيد غير كافٍ لـ ${bal.name}. المتبقي: ${bal.balance} ${bal.unit}`,"error");return;}}
    setSaving(true);
    try{
      const ts=now();const groupId=ts;
      for(const row of rows){const bal=bals.find(b=>b.id===row.itemId);await DB.expenses.add({techId:user.techId,itemId:row.itemId,quantity:row.qty,location,notes,subscriberName:subName.trim(),subscriberUser:subUser.trim(),workImage:workImg,createdAt:ts,groupId});await DB.audit.add(user.techName||"tech","صرفية",`${row.qty} ${bal.unit} من ${bal.name} → ${subName}`);}
      const summary=rows.map(r=>{const b=bals.find(x=>x.id===r.itemId);return `${r.qty} ${b?.unit||""} ${b?.name||""}`;}).join(" + ");
      setOk(`✅ تم تسجيل: ${summary} للمشترك ${subName} — ${ts}`);
      toast("✅ تم تسجيل الصرفية");
      setSubName("");setSubUser("");setNotes("");setLocation(null);setWorkImg(null);
      await load();
    }catch(e){toast("خطأ: "+e.message,"error");}
    setSaving(false);
  };
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>📤 تسجيل صرفية</div>
    {bals.length===0?<Card style={{padding:50,textAlign:"center"}}><div style={{color:C.muted}}>لا يوجد رصيد في حسابك</div></Card>
    :<Card style={{padding:16,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,color:C.muted,marginBottom:10}}>👤 المشترك</div>
      <Input label="اسم المشترك *" value={subName} onChange={setSubName} placeholder="العميل"/>
      <Input label="يوزر المشترك" value={subUser} onChange={setSubUser} placeholder="@username"/>
      <Divider/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,color:C.muted}}>📦 المواد المصروفة</div>
        <Btn onClick={()=>{const usedIds=rows.map(r=>r.itemId);const free=bals.find(b=>!usedIds.includes(b.id))||bals[0];setRows(r=>[...r,{itemId:free.id,qty:1}]);}} color={C.blue} size="sm" icon="+" disabled={rows.length>=bals.length}>إضافة مادة</Btn>
      </div>
      {rows.map((row,idx)=><ExpenseItemRow key={idx} bals={bals} row={row} allItems={allItems} onChange={val=>setRows(r=>r.map((x,i)=>i===idx?val:x))} onRemove={()=>setRows(r=>r.filter((_,i)=>i!==idx))} canRemove={rows.length>1}/>)}
      <Divider/>
      <GPSButton onLocation={setLocation}/>
      <Input label="ملاحظة" value={notes} onChange={setNotes} placeholder="وصف العمل..."/>
      <ImagePicker label="(اختياري) صورة العمل" value={workImg} onChange={setWorkImg}/>
      {ok&&<div style={{background:`${C.green}15`,border:`1px solid ${C.green}40`,borderRadius:10,padding:"9px 14px",color:C.green,fontSize:12,marginBottom:12,lineHeight:1.6}}>{ok}</div>}
      <Btn onClick={submit} color={C.amber} full size="lg" loading={saving}>Submit — تسجيل الصرفية</Btn>
    </Card>}
  </div>;
}

    <div style={{fontWeight:800,fontSize:18,marginBottom:12}}>📋 سجلي</div>
    <div style={{display:"flex",gap:4,background:C.bg2,borderRadius:13,padding:4,marginBottom:14,border:`1px solid ${C.border}`}}>
      {[["exp",`صرفياتي (${expGroups.length})`],["rec",`ما استلمت (${rec.length})`]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",background:tab===v?C.bg4:"transparent",color:tab===v?C.text:C.muted,fontWeight:tab===v?700:400,fontSize:13}}>{l}</button>)}
    </div>
    {tab==="exp"&&(expGroups.length===0?<div style={{color:C.muted,textAlign:"center",padding:50}}>لا توجد سجلات</div>:expGroups.map((group,i)=><GroupedOpsRow key={i} group={group} allItems={items}/>))}
    {tab==="rec"&&(rec.length===0?<div style={{color:C.muted,textAlign:"center",padding:50}}>لا توجد سجلات</div>:rec.map((op,i)=><OpsRow key={i} op={op}/>))}
  </div>;
}

function TechProfile({user,onLogout,toast}){
  const [pwM,setPwM]=useState(false);const [pw,setPw]=useState("");const [pw2,setPw2]=useState("");const [info,setInfo]=useState(null);const [saving,setSaving]=useState(false);
  useEffect(()=>{(async()=>{const [bals,tech,exps]=await Promise.all([DB.fullBalances(user.techId),DB.techs.find(user.techId),DB.expenses.byTech(user.techId)]);setInfo({bals,tech,expCount:exps.length});})();},[user.techId]);
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>👤 ملفي</div>
    <Card style={{padding:20,marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
        <div style={{width:54,height:54,borderRadius:"50%",background:`linear-gradient(135deg,${C.greenD},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🛠</div>
        <div><div style={{fontWeight:800,fontSize:17}}>{user.techName}</div><div style={{color:C.muted,fontSize:12}}>@{user.username}</div>{info?.tech?.phone&&<div style={{color:C.muted,fontSize:12}}>📱 {info.tech.phone}</div>}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:C.bg3,borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:20,color:C.blue,fontWeight:700}}>{info?.bals?.length||0}</div><div style={{color:C.muted,fontSize:11}}>أنواع المواد</div></div>
        <div style={{background:C.bg3,borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:20,color:C.green,fontWeight:700}}>{info?.expCount||0}</div><div style={{color:C.muted,fontSize:11}}>الصرفيات</div></div>
      </div>
    </Card>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <Btn onClick={()=>setPwM(true)} color={C.purple} full icon="🔑">تغيير كلمة المرور</Btn>
      <Btn onClick={onLogout} color={C.red} full outline icon="🚪">تسجيل خروج</Btn>
    </div>
    <Modal open={pwM} onClose={()=>setPwM(false)} title="🔑 تغيير كلمة المرور">
      <Input label="الجديدة *" type="password" value={pw} onChange={setPw} placeholder="••••••"/>
      <Input label="تأكيد *" type="password" value={pw2} onChange={setPw2} placeholder="••••••"/>
      <Btn loading={saving} onClick={async()=>{if(pw!==pw2){toast("غير متطابقتان","error");return;}if(pw.length<4){toast("قصيرة جداً","error");return;}setSaving(true);await DB.techUsers.changePw(user.id,pw);toast("✅ تم التغيير");setPwM(false);setPw("");setPw2("");setSaving(false);}} color={C.purple} full style={{marginTop:8}}>حفظ ✓</Btn>
    </Modal>
  </div>;
}

//  VIEWER
// ═══════════════════════════════════════════
function ViewerApp({user,onLogout}){
  const [page,setPage]=useState("dash");
  const tabs=[{id:"dash",icon:"📊",label:"نظرة عامة"},{id:"hist",icon:"📋",label:"السجل"},{id:"items",icon:"🔧",label:"المعدات"}];
  const renderPage=()=>{if(page==="dash")return <AdminDash/>;if(page==="hist")return <AdminHistory/>;return <ViewerItems/>;};
  return <>
    <div style={{position:"sticky",top:0,zIndex:50,background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"11px 16px",maxWidth:500,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><Dot c={C.purple} pulse/><span style={{fontWeight:700,fontSize:14}}>Space Link</span></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge color={C.purple} small>👁 Viewer</Badge><button onClick={onLogout} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>خروج</button></div>
    </div>
    <div style={{maxWidth:500,margin:"0 auto",paddingBottom:80}}>{renderPage()}</div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:500,margin:"0 auto",background:C.bg2,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flex:1,padding:"10px 4px 8px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
        <span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:10,color:page===t.id?C.purple:C.muted,fontWeight:page===t.id?700:400}}>{t.label}</span>
        {page===t.id&&<div style={{width:16,height:2,borderRadius:1,background:C.purple}}/>}
      </button>)}
    </div>
  </>;
}
function ViewerItems(){
  const [items,setItems]=useState(null);
  useEffect(()=>{DB.items.all().then(setItems);},[]);
  if(!items)return <LoadingPage/>;
  return <div className="page" style={{padding:"18px 14px"}}>
    <div style={{fontWeight:800,fontSize:18,marginBottom:14}}>🔧 قائمة المعدات</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      {items.map(it=><Card key={it.id} style={{padding:0,overflow:"hidden"}}>
        {it.image?<img src={it.image} style={{width:"100%",height:80,objectFit:"cover"}} alt=""/>:<div style={{height:80,background:C.bg3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📦</div>}
        <div style={{padding:"9px 11px"}}><div style={{fontWeight:700,fontSize:13}}>{it.name}</div><div style={{color:C.muted,fontSize:11}}>{it.unit} · {it.category}</div></div>
      </Card>)}
    </div>
  </div>;
}

// ═══════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);const [page,setPage]=useState("dash");
  const [toast,setToast]=useState({msg:"",visible:false,type:"success"});

  // Restore session on load
  useEffect(()=>{
    DB.admin.seed();
    try{
      const saved=localStorage.getItem("sl_session");
      if(saved){const u=JSON.parse(saved);setUser(u);}
    }catch{}
  },[]);

  const doLogin=(u)=>{
    setUser(u);setPage("dash");
    // Save session if stay signed in
    if(u._stay) localStorage.setItem("sl_session",JSON.stringify(u));
    else localStorage.removeItem("sl_session");
  };
  const doLogout=()=>{setUser(null);setPage("dash");localStorage.removeItem("sl_session");cache.clearAll();};

  // Preload critical data after login
  useEffect(()=>{
    if(user){DB.items.all();DB.techs.all();DB.techUsers.all();}
  },[user]);

  // Request camera + geolocation permissions for tech on login
  useEffect(()=>{
    if(user?.role==="tech"){
      // GPS watch
      if(navigator.geolocation){
        navigator.geolocation.watchPosition(
          pos=>{const l={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6)};localStorage.setItem("sl_techLoc_"+user.techId,JSON.stringify(l));},
          ()=>{},
          {enableHighAccuracy:true,maximumAge:30000}
        );
      }
      // Camera permission request
      if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
        navigator.mediaDevices.getUserMedia({video:true}).then(s=>{s.getTracks().forEach(t=>t.stop());}).catch(()=>{});
      }
    }
  },[user]);
  const showToast=useCallback((msg,type="success")=>{setToast({msg,visible:true,type});setTimeout(()=>setToast(t=>({...t,visible:false})),2800);},[]);
  const adminTabs=[{id:"dash",icon:"📊",label:"Dashboard"},{id:"techs",icon:"👷",label:"الفنيين"},{id:"items",icon:"🔧",label:"المعدات"},{id:"receipt",icon:"📦",label:"تسليم"},{id:"history",icon:"📋",label:"السجل"},{id:"reports",icon:"📈",label:"تقارير"},{id:"audit",icon:"🔍",label:"تدقيق"},{id:"viewers",icon:"👁",label:"Viewers"},{id:"admins",icon:"🔑",label:"Admins"}];
  const techTabs=[{id:"dash",icon:"📦",label:"رصيدي"},{id:"expense",icon:"📤",label:"صرفية"},{id:"history",icon:"📋",label:"سجلي"},{id:"profile",icon:"👤",label:"ملفي"}];
  if(!user)return <><style>{css}</style><LoginScreen onLogin={doLogin}/></>;
  if(user.role==="viewer")return <><style>{css}</style><Toast {...toast}/><ViewerApp user={user} onLogout={doLogout}/></>;
  const isAdmin=user.role==="admin";const tabs=isAdmin?adminTabs:techTabs;const color=isAdmin?C.blue:C.green;
  const renderPage=()=>{
    if(isAdmin)switch(page){case"dash":return<AdminDash/>;case"techs":return<AdminTechs user={user} toast={showToast}/>;case"items":return<AdminItems user={user} toast={showToast}/>;case"receipt":return<AdminReceipt user={user} toast={showToast}/>;case"history":return<AdminHistory/>;case"reports":return<AdminReports toast={showToast}/>;case"audit":return<AdminAudit/>;case"viewers":return<AdminViewers user={user} toast={showToast}/>;default:return<AdminDash/>;}
    switch(page){case"dash":return<TechDash user={user}/>;case"expense":return<TechExpense user={user} toast={showToast}/>;case"history":return<TechHistory user={user}/>;case"profile":return<TechProfile user={user} onLogout={doLogout} toast={showToast}/>;default:return<TechDash user={user}/>;}
  };
  return <>
    <style>{css}</style>
    <Toast {...toast}/>
    <div style={{position:"sticky",top:0,zIndex:50,background:C.bg2,borderBottom:`1px solid ${C.border}`,maxWidth:500,margin:"0 auto"}}>
      <div style={{padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Dot c={color} pulse/><span style={{fontWeight:700,fontSize:14}}>Space Link</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge color={color} small>{isAdmin?"🔑 Administrator":"🛠 "+user.techName}</Badge><button onClick={doLogout} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>خروج</button></div>
      </div>
    </div>
    <div style={{maxWidth:500,margin:"0 auto",paddingBottom:90}}>{renderPage()}</div>
    {isAdmin
      ?<div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:500,margin:"0 auto",background:C.bg2,borderTop:`1px solid ${C.border}`,zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0)"}}><div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
        {adminTabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flexShrink:0,flex:"1 0 auto",minWidth:64,padding:"10px 6px 8px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",borderTop:`2px solid ${page===t.id?color:"transparent"}`}}>
          <span style={{fontSize:19}}>{t.icon}</span><span style={{fontSize:9,color:page===t.id?color:C.muted,fontWeight:page===t.id?700:400,whiteSpace:"nowrap"}}>{t.label}</span>
        </button>)}
      </div></div>
      :<div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:500,margin:"0 auto",background:C.bg2,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {techTabs.map(t=><button key={t.id} onClick={()=>setPage(t.id)} style={{flex:1,padding:"10px 4px 8px",background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
          <span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:10,color:page===t.id?color:C.muted,fontWeight:page===t.id?700:400}}>{t.label}</span>
          {page===t.id&&<div style={{width:16,height:2,borderRadius:1,background:color}}/>}
        </button>)}
      </div>}
  </>;
}
</script>
</body>
</html>
